*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#f2f2f7;color:#1c1c1e;max-width:480px;margin:0 auto;min-height:100vh}
/* 헤더 */
.hdr{background:#fff;padding:20px 20px 0}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hdr-lbl{font-size:13px;color:#888;font-weight:500}
.hdr-btns{display:flex;gap:16px;align-items:center}
.hdr-btn{font-size:22px;cursor:pointer;color:#444;background:none;border:none;padding:0}
.hdr-total{font-size:32px;font-weight:700;letter-spacing:-.5px;margin-bottom:4px}
.hdr-pnl{font-size:14px;font-weight:500;margin-bottom:4px}
.hdr-mdiv{font-size:13px;color:#d97706;margin-bottom:4px;display:none}
.hdr-upd{font-size:11px;color:#aaa;margin-bottom:0}
.pos{color:#2563eb}.neg{color:#dc2626}
/* 탭 아이콘 */
.icon-tabs{display:flex;border-top:1px solid #f0f0f0;margin:12px -20px 0;padding:8px 0 0}
.itab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:6px 0 10px}
.itab-ico{font-size:22px}
.itab-lbl{font-size:11px;color:#aaa}
.itab.on .itab-lbl{color:#4f46e5;font-weight:700}
/* 섹션 */
.section{background:#fff;margin-top:10px}
.sort-bar{display:flex;align-items:center;padding:10px 16px;gap:0;border-bottom:1px solid #f5f5f5}
.stab{font-size:13px;color:#aaa;padding:5px 10px;cursor:pointer;border-radius:7px}
.stab.on{color:#1c1c1e;font-weight:700;background:#f2f2f7}
.sdiv{width:1px;height:12px;background:#e0e0e0;margin:0 2px}
.fbtns{margin-left:auto;display:flex;gap:5px}
.fbtn{font-size:12px;padding:4px 10px;border-radius:12px;border:1px solid #e0e0e0;background:#fff;color:#888;cursor:pointer}
.fbtn.on{border-color:#4f46e5;color:#4f46e5;font-weight:600}
/* 종목 행 */
.slist{padding:0 16px}
.srow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f5f5f5;cursor:pointer}
.srow:last-child{border:none}
.srow:active{background:#fafafa}
.sico{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.snm-area{flex:1;min-width:0}
.snm{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ssub{font-size:12px;color:#888;margin-top:2px}
.sright{text-align:right;flex-shrink:0}
.sval{font-size:14px;font-weight:700}
.spnl{font-size:12px;font-weight:500}
.sbadge{font-size:10px;padding:1px 5px;border-radius:5px;margin-left:4px;vertical-align:middle;font-weight:600}
.empty{text-align:center;padding:50px 20px;color:#aaa}
.add-wrap{padding:14px 16px}
.add-btn{width:100%;padding:13px;border-radius:12px;border:1.5px dashed #c7d2fe;background:#eef2ff;color:#4f46e5;font-size:14px;font-weight:600;cursor:pointer}
/* 상세 페이지 */
.detail-page{display:none;background:#f2f2f7;min-height:100vh}
.detail-hdr{background:#fff;padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;z-index:10}
.back-btn{font-size:20px;color:#4f46e5;cursor:pointer;background:none;border:none;padding:4px 8px 4px 0}
.detail-title{font-size:16px;font-weight:700;flex:1}
.detail-body{padding:14px}
.dcard{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px}
.dcard-title{font-size:12px;color:#888;margin-bottom:12px;font-weight:600;letter-spacing:.3px}
.drow{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #f5f5f5}
.drow:last-child{border:none}
.drow-lbl{font-size:13px;color:#888}
.drow-val{font-size:13px;font-weight:600}
.big-val{font-size:26px;font-weight:700;margin-bottom:4px}
.big-pnl{font-size:15px;font-weight:600}
.action-btns{display:flex;gap:10px;margin-bottom:12px}
.action-btn{flex:1;padding:13px;border-radius:12px;font-size:14px;font-weight:600;cursor:pointer;border:none;text-align:center}
.btn-buy{background:#eef2ff;color:#4f46e5}
.btn-del{background:#fef2f2;color:#dc2626}
.btn-rf{background:#f0fdf4;color:#16a34a}

.div-hist-row{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.div-hist-row:last-child{border:none}
.div-date{color:#888}
.div-amt{font-weight:600;color:#d97706}
/* 추가매수 인라인 */

.irow{display:flex;gap:10px}
.ifg{flex:1}
.ifl{font-size:11px;color:#888;margin-bottom:4px}
.iw{display:flex;align-items:center;background:#fff;border:1.5px solid #e0e0e0;border-radius:9px}
.iw:focus-within{border-color:#4f46e5}
.inp{flex:1;padding:10px 11px;border:none;background:transparent;font-size:14px;outline:none;min-width:0;color:#1c1c1e}
.suf{padding-right:9px;font-size:12px;color:#aaa}
.confirm-btn{width:100%;padding:12px;border-radius:10px;border:none;background:#4f46e5;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:10px}
/* 글로벌 로딩 */
#gld{display:none;position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.gs{width:36px;height:36px;border-radius:50%;border:3px solid #c7d2fe;border-top-color:#4f46e5;animation:sp .75s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.spin{display:inline-block;width:10px;height:10px;border:2px solid #c7d2fe;border-top-color:#4f46e5;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
/* 모달 */
.ovm{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center}
.ovm.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:22px 20px 44px;width:100%;max-width:480px;max-height:93vh;overflow-y:auto}
.mt{font-weight:700;font-size:17px;margin-bottom:16px}
.fl{font-size:12px;color:#888;margin-bottom:4px}
.fg{margin-bottom:12px}
.fr{display:flex;gap:10px}.fr .fg{flex:1}
.hint{background:#eef2ff;border-radius:9px;padding:9px 12px;font-size:12px;color:#4f46e5;margin-bottom:14px;line-height:1.5}
.mbtns{display:flex;gap:10px}
.bcn{flex:1;padding:13px;border-radius:10px;border:1px solid #e0e0e0;background:#f9f9f9;font-size:14px;cursor:pointer}
.bsb{flex:2;padding:13px;border-radius:10px;border:none;background:#4f46e5;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
/* 검색 드롭다운 */
.srch-wrap{position:relative}
.srch-dd{display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e0e0e0;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.1);z-index:200;max-height:230px;overflow-y:auto;margin-top:3px}
.srch-dd.show{display:block}
.ddi{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f5f5f5}
.ddi:last-child{border:none}
.ddi:active{background:#f9f9f9}
.din{font-size:13px;font-weight:600}
.dis{font-size:11px;color:#aaa;margin-top:1px}

.chart-wrap{padding:14px}
.ccard{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px}
.cttl{font-size:12px;color:#888;margin-bottom:10px;font-weight:600}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.scard{background:#fff;border-radius:12px;padding:12px 14px;border:1px solid #f0f0f0}
.slbl{font-size:11px;color:#aaa;margin-bottom:3px}
.sval{font-size:17px;font-weight:700}
.sbg{background:#f0f0f0;border-radius:4px;height:5px;margin-top:4px}
.sbar2{height:5px;border-radius:4px}
.mbars{display:flex;align-items:flex-end;gap:3px;height:72px;margin-bottom:6px}
.mcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.mbar{width:100%;border-radius:2px 2px 0 0}
.mlbl{font-size:8px;color:#aaa}
.mpills{display:flex;flex-wrap:wrap;gap:5px}
.mpill{font-size:11px;padding:3px 8px;border-radius:6px}
.lrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ldot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.lnm{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

.lvl{font-size:12px;color:#888;min-width:58px;text-align:right}

    </div>

      <div class="ccard" id="legCard"></div>

  </div>
</div>

<!-- 상세 페이지 -->

</div>

<!-- 종목 추가 모달 -->

</div>

function fmt(n){n=Math.round(n||0);const a=Math.abs(n),s=n<0?'-':'';if(a>=100000000)return s+(a/100000000).toFixed(1)+'억원';if(a>=10000)return s+Math.round(a/10000)+'만원';return n.toLocaleString()+'원'}
function fN(n){return Math.round(n||0).toLocaleString()}
function dvN(df){return df==='월배당'?12:df==='분기배당'?4:df==='반기배당'?2:1}
function isKR(s){return s&&(s.endsWith('.KS')||s.endsWith('.KQ'))}
function toSym(nm){const db=DB.find(x=>x.n===nm);return db?db.s:(nm.match(/^\d{6}$/)?nm+'.KS':nm.toUpperCase())}
function abbr(n){const clean=n.replace(/[^가-힣a-zA-Z0-9]/g,'');return clean.length<=3?clean.toUpperCase():clean.slice(0,2).toUpperCase()}
function colorIdx(id){return D.h.findIndex(x=>x.id===id)}

/* ── API ── */
const PROXIES=[u=>'https://corsproxy.io/?'+encodeURIComponent(u),u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u)];

async function yahooQuote(sym){
  for(const srv of['query1','query2']){
    for(const mkP of PROXIES){
      try{
        const url=`https://${srv}.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`;
        const r=await fetch(mkP(url));if(!r.ok)continue;
        const txt=await r.text();
        const j=JSON.parse(txt.includes('"contents"')?JSON.parse(txt).contents:txt);
        const p=j?.chart?.result?.[0]?.meta?.regularMarketPrice;
        if(p&&p>0)return p;
      }catch{}
    }
  }
  throw new Error('yahoo fail');
}
async function fhQuote(sym){
  const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${FKEY}`);
  if(!r.ok)throw new Error('fh err');
  const j=await r.json();if(!j.c||j.c<=0)throw new Error('no price');return j.c;
}
async function fetchRate(){
  try{const r=await fetch('https://api.frankfurter.app/latest?from=USD&to=KRW');const j=await r.json();if(j?.rates?.KRW>100)D.rate=Math.round(j.rates.KRW);}catch{}
}
async function getPrice(sym){
  if(isKR(sym))return Math.round(await yahooQuote(sym));
  try{return Math.round((await fhQuote(sym))*D.rate);}catch{return Math.round((await yahooQuote(sym))*D.rate);}
}
async function yahooDiv(sym){
  const now=Math.floor(Date.now()/1000),p1=now-400*24*3600;
  /* CSV 방식 */
  for(const srv of['query1','query2']){
    for(const mkP of PROXIES){
      try{
        const url=`https://${srv}.finance.yahoo.com/v7/finance/download/${encodeURIComponent(sym)}?period1=${p1}&period2=${now}&interval=1d&events=div`;
        const r=await fetch(mkP(url));if(!r.ok)continue;
        const txt=await r.text();
        if(!txt.includes(','))continue;
        const rows=txt.trim().split('\n').slice(1).filter(l=>l&&l.includes(',')).map(l=>{const[d,a]=l.split(',');return{date:(d||'').trim(),amount:parseFloat(a)||0};}).filter(x=>x.amount>0).sort((a,b)=>b.date.localeCompare(a.date));
        if(rows.length)return rows;
      }catch{}
    }
  }
  /* chart 이벤트 방식 */
  for(const srv of['query1','query2']){
    for(const mkP of PROXIES){
      try{
        const url=`https://${srv}.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2y&events=div`;
        const r=await fetch(mkP(url));if(!r.ok)continue;
        const txt=await r.text();
        const j=JSON.parse(txt.includes('"contents"')?JSON.parse(txt).contents:txt);
        const ev=j?.chart?.result?.[0]?.events?.dividends;
        if(!ev)continue;
        const rows=Object.values(ev).filter(d=>d.date>p1).map(d=>({date:new Date(d.date*1000).toISOString().split('T')[0],amount:parseFloat((d.amount||0).toFixed(4))})).sort((a,b)=>b.date.localeCompare(a.date));
        if(rows.length)return rows;
      }catch{}
    }
  }
  return[];
}

async function fetchOne(id){
  const h=D.h.find(x=>x.id===id);if(!h)return;
  LDS.add(id);renderAll();
  try{
    const p=await getPrice(h.sym||toSym(h.n));
    D.h=D.h.map(x=>x.id===id?{...x,cur:p,err:0}:x);
    D.at=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    save();
  }catch{D.h=D.h.map(x=>x.id===id?{...x,err:1}:x);}
  LDS.delete(id);renderAll();
}
async function fetchDivs(id){
  const h=D.h.find(x=>x.id===id);if(!h)return;
  LDS.add(id);renderAll();
  try{
    const rows=await yahooDiv(h.sym||toSym(h.n));
    D.h=D.h.map(x=>x.id===id?{...x,divHistory:rows}:x);save();
  }catch{D.h=D.h.map(x=>x.id===id?{...x,divHistory:[]}:x);}
  LDS.delete(id);renderAll();
}
async function refreshAll(){
  if(LDALL||!D.h.length)return;
  LDALL=true;setBusy(true);showG('환율 조회 중...');
  await fetchRate();
  for(let i=0;i<D.h.length;i++){
    const h=D.h[i];setGMsg(`[${i+1}/${D.h.length}] ${h.n} 조회 중...`);
    LDS.add(h.id);
    try{const p=await getPrice(h.sym||toSym(h.n));D.h=D.h.map(x=>x.id===h.id?{...x,cur:p,err:0}:x);}
    catch{D.h=D.h.map(x=>x.id===h.id?{...x,err:1}:x);}
    LDS.delete(h.id);
  }
  D.at=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  save();hideG();setBusy(false);LDALL=false;renderAll();
}

function renderAll(){

  else if(TAB==='chart')renderPie();

}
function renderHeader(){
  const H=D.h;
  const tV=H.reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);
  const tC=H.reduce((s,h)=>h.avgCost*h.qty+s,0);
  const pnl=tV-tC,pct=tC>0?pnl/tC*100:0;
  const dvH=H.filter(h=>h.isDv&&h.dy>0);
  const mDiv=dvH.reduce((s,h)=>{const a=(h.cur||h.avg)*h.qty*h.dy/100;return s+a/dvN(h.df);},0);
  document.getElementById('hTotal').textContent=fmt(tV);
  const pe=document.getElementById('hPnl');
  pe.textContent=H.length?`${pnl>=0?'+':''}${fmt(pnl)} (${pct>=0?'+':''}${pct.toFixed(2)}%) 총 수익`:'';
  pe.className='hdr-pnl '+(pnl>=0?'pos':'neg');
  const de=document.getElementById('hDiv');
  if(mDiv>0){de.style.display='block';de.textContent=`🪙 월 예상 배당 ${fmt(mDiv)}`;}else de.style.display='none';
  document.getElementById('hUpd').textContent=D.at?`업데이트 ${D.at} · USD/KRW ${fN(D.rate)}원`:'';
}
function renderList(){
  const H=D.h;
  document.getElementById('eEmpty').style.display=H.length?'none':'block';
  let fil=H.filter(h=>FLT==='all'?true:FLT==='div'?(h.isDv&&h.dy>0):(!h.isDv||!h.dy));
  const tV=H.reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);
  if(SORT==='val')fil=[...fil].sort((a,b)=>(b.cur||b.avg)*b.qty-(a.cur||a.avg)*a.qty);
  else fil=[...fil].sort((a,b)=>((b.cur||b.avg)-b.avgCost)*b.qty-((a.cur||a.avg)-a.avgCost)*a.qty);
  document.getElementById('hList').innerHTML=fil.map(h=>{
    const ci=colorIdx(h.id);
    const cur=h.cur||h.avg,val=cur*h.qty;
    const pp=(cur-h.avgCost)*h.qty,pp2=(cur-h.avgCost)/h.avgCost*100;
    const isLd=LDS.has(h.id);

  <div class="snm-area">
    <div class="snm">${h.n}${h.isDv&&h.dy>0?`<span class="sbadge" style="background:${BGS[ci%BGS.length]};color:${COLORS[ci%COLORS.length]}">${h.df}</span>`:''}</div>
    <div class="ssub">${fN(h.qty)}주 · ${isLd?`<span class="spin"></span>조회중`:fN(cur)+'원'}${h.err?' · <span style="color:#dc2626">조회실패</span>':''}</div>
  </div>
  <div class="sright">
    <div class="sval">${fmt(val)}</div>
    <div class="spnl ${pp>=0?'pos':'neg'}">${pp>=0?'+':''}${fmt(pp)} (${pp2>=0?'+':''}${pp2.toFixed(1)}%)</div>
  </div>
</div>`;

}

function confirmBuy2(id){

function delH(id){

async function addHolding(){
  const nm=document.getElementById('aName').value.trim();
  const avg=parseFloat(document.getElementById('aAvg').value);
  const qty=parseInt(document.getElementById('aQty').value);
  const dy=parseFloat(document.getElementById('aDy').value)||0;

  const sym=dbI?dbI.s:toSym(nm);

  D.h.push({id,n:nm,sym,avg,avgCost:avg,qty,cur:avg,dy,df:dy>0?df:'없음',isDv:dy>0,err:0});

  renderAll();

function renderSim(){
  const H=D.h,tV=H.reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);
  const dvH=H.filter(h=>h.isDv&&h.dy>0);
  const sc=document.getElementById('simCont');
  if(!dvH.length){sc.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:10px">🪙</div><div>배당주를 추가하면 시뮬레이션이 표시됩니다</div></div>';return;}
  const ss=dvH.map((h,idx)=>{const val=(h.cur||h.avg)*h.qty,ann=val*h.dy/100;return{...h,val,ann,mon:ann/12,pp:ann/dvN(h.df),idx};});
  const tM=ss.reduce((s,x)=>s+x.mon,0),tA=ss.reduce((s,x)=>s+x.ann,0),tD=ss.reduce((s,x)=>s+x.val,0);
  const aY=tD>0?tA/tD*100:0,mxM=Math.max(...ss.map(x=>x.mon),1);
  const md=Array(12).fill(0).map(()=>({t:0}));
  ss.forEach(x=>{const a=m=>{md[m].t+=x.pp};if(x.df==='월배당'){for(let m=0;m<12;m++)md[m].t+=x.mon;}else if(x.df==='분기배당')[2,5,8,11].forEach(a);else if(x.df==='반기배당')[5,11].forEach(a);else if(x.df==='연배당')a(11);});
  const mxB=Math.max(...md.map(m=>m.t),1);
  sc.innerHTML=`<div class="sgrid">${[['월 예상 배당',fmt(tM),'#d97706'],['연 예상 배당',fmt(tA),'#4f46e5'],['평균 배당수익률',aY.toFixed(2)+'%','#16a34a'],['배당주 평가금액',fmt(tD),'#0891b2']].map(([l,v,c])=>`<div class="scard"><div class="slbl">${l}</div><div class="sval" style="color:${c}">${v}</div></div>`).join('')}</div>
<div class="ccard"><div class="cttl">종목별 월 배당</div>${ss.map(x=>`<div style="margin-bottom:12px"><div style="display:flex;justify-content:space-between;margin-bottom:4px"><div><b style="font-size:13px">${x.n}</b><span class="sbadge" style="background:${BGS[x.idx%BGS.length]};color:${COLORS[x.idx%COLORS.length]};margin-left:5px">${x.df}</span></div><div style="text-align:right"><div style="font-size:13px;font-weight:700;color:#d97706">${fmt(x.mon)}/월</div><div style="font-size:11px;color:#aaa">연 ${fmt(x.ann)} · ${x.dy.toFixed(1)}%</div></div></div><div class="sbg"><div class="sbar2" style="width:${x.mon/mxM*100}%;background:${COLORS[x.idx%COLORS.length]}"></div></div></div>`).join('')}</div>
<div class="ccard"><div class="cttl">월별 배당 입금 예상</div><div class="mbars">${md.map((m,i)=>`<div class="mcol"><div class="mbar" style="height:${m.t>0?Math.max(m.t/mxB*60,5):3}px;background:${m.t>0?'#4f46e5':'#e8e8e8'}"></div><div class="mlbl">${i+1}</div></div>`).join('')}</div><div class="mpills">${md.map((m,i)=>`<span class="mpill" style="background:${m.t>0?'#eef2ff':'#f5f5f5'};color:${m.t>0?'#4f46e5':'#bbb'}">${i+1}월 ${m.t>0?fmt(m.t):'—'}</span>`).join('')}</div><div style="font-size:10px;color:#aaa;margin-top:8px;padding-top:8px;border-top:1px solid #f0f0f0">※ 분기배당 3·6·9·12월 / 반기배당 6·12월 기준 추정</div></div>`;
}

/* ── 파이차트 ── */
function renderPie(){
  const H=D.h,tV=H.reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);
  const lc=document.getElementById('legCard');
  if(!H.length){if(PIE){PIE.destroy();PIE=null;}lc.innerHTML='';return;}
  if(PIE)PIE.destroy();
  PIE=new Chart(document.getElementById('pieC'),{
    type:'doughnut',
    data:{labels:H.map(h=>h.n.length>8?h.n.slice(0,8)+'…':h.n),datasets:[{data:H.map(h=>Math.round((h.cur||h.avg)*h.qty)),backgroundColor:COLORS.slice(0,H.length),borderWidth:2,borderColor:'#f2f2f7'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmt(c.raw)} (${(c.raw/tV*100).toFixed(1)}%)`}}}}
  });
  lc.innerHTML=H.map((h,i)=>{const v=(h.cur||h.avg)*h.qty,p=tV>0?v/tV*100:0;return`<div class="lrow"><div class="ldot" style="background:${COLORS[i%COLORS.length]}"></div><div class="lnm">${h.n}</div><div class="lpc">${p.toFixed(1)}%</div><div class="lvl">${fmt(v)}</div></div>`;}).join('')+`<div style="border-top:1px solid #f0f0f0;padding-top:9px;margin-top:4px;display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600">합계</span><span style="font-size:13px;font-weight:700;color:#4f46e5">${fmt(tV)}</span></div>`;
}

/* ── 로딩 ── */
let _gt=null;
function showG(m){document.getElementById('gld').style.display='flex';setGMsg(m);if(_gt)clearTimeout(_gt);_gt=setTimeout(forceClose,30000);}
function setGMsg(m){document.getElementById('gmsg').textContent=m;}
function hideG(){document.getElementById('gld').style.display='none';if(_gt){clearTimeout(_gt);_gt=null;}}
function forceClose(){hideG();LDALL=false;setBusy(false);LDS.clear();renderAll();}
function setBusy(b){const btn=document.getElementById('rfBtn');if(btn)btn.style.animation=b?'sp .75s linear infinite':'none';}

renderAll();
</script>
