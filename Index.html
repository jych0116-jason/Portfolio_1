<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>내 포트폴리오</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#f2f2f7;color:#1c1c1e;max-width:480px;margin:0 auto;min-height:100vh}
.hdr{background:#fff;padding:18px 18px 0}
.hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hdr-lbl{font-size:13px;color:#888}
.hdr-actions{display:flex;gap:14px}
.hdr-btn{background:none;border:none;font-size:22px;cursor:pointer;color:#333;padding:2px;line-height:1}
.h-total{font-size:30px;font-weight:700;letter-spacing:-.5px}
.h-pnl{font-size:13px;font-weight:500;margin-top:2px}
.h-sub{font-size:11px;color:#888;margin-top:2px}
.h-div{font-size:12px;color:#d97706;margin-top:2px;display:none}
.h-upd{font-size:10px;color:#aaa;margin-top:2px}
.pos{color:#2563eb}.neg{color:#dc2626}
.itabs{display:flex;border-top:1px solid #f0f0f0;margin:10px -18px 0}
.itab{flex:1;background:none;border:none;display:flex;flex-direction:column;align-items:center;gap:3px;padding:9px 0 11px;cursor:pointer}
.itab span:first-child{font-size:20px}
.itab span:last-child{font-size:11px;color:#aaa}
.itab.on span:last-child{color:#4f46e5;font-weight:700}
.sec{background:#fff;margin-top:10px}
.sort-bar{display:flex;align-items:center;padding:10px 16px;gap:4px;flex-wrap:wrap}
.stab{background:none;border:none;font-size:13px;color:#aaa;padding:5px 8px;border-radius:7px;cursor:pointer}
.stab.on{color:#1c1c1e;font-weight:700;background:#f2f2f7}
.sdiv{width:1px;height:12px;background:#ddd}
.fbtns{margin-left:auto;display:flex;gap:4px}
.fbtn{font-size:11px;padding:4px 9px;border-radius:12px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer}
.fbtn.on{border-color:#4f46e5;color:#4f46e5;font-weight:600}
.fbtn-d.on{border-color:#16a34a;color:#16a34a}
.fbtn-h.on{border-color:#d97706;color:#d97706}
.fbtn-n.on{border-color:#888;color:#555}
.slist{padding:0 16px}
.srow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f5f5f5;cursor:pointer}
.srow:last-child{border:none}
.sico{width:44px;height:44px;min-width:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff;flex-shrink:0}
.s-info{flex:1;min-width:0;overflow:hidden}
.s-nm{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-sub{font-size:12px;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.s-right{text-align:right;flex-shrink:0;min-width:88px}
.s-val{font-size:14px;font-weight:700}
.s-pnl{font-size:12px;font-weight:500}
.bdg{font-size:10px;padding:1px 5px;border-radius:5px;margin-left:4px;font-weight:600;vertical-align:middle}
.empty{text-align:center;padding:48px 16px;color:#aaa}
.add-wrap{padding:12px 16px}
.add-btn{width:100%;padding:13px;border-radius:12px;border:1.5px dashed #c7d2fe;background:#eef2ff;color:#4f46e5;font-size:14px;font-weight:600;cursor:pointer}
/* 상세 */
.det{display:none;background:#f2f2f7;min-height:100vh}
.det-hdr{background:#fff;padding:13px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;z-index:10}
.det-back{background:none;border:none;font-size:22px;color:#4f46e5;cursor:pointer;padding:2px 8px 2px 0;line-height:1}
.det-title{font-size:16px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.det-body{padding:14px}
.dcard{background:#fff;border-radius:14px;padding:15px;margin-bottom:12px}
.dcard-t{font-size:11px;color:#888;font-weight:600;letter-spacing:.3px;margin-bottom:10px}
.drow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f5f5f5}
.drow:last-child{border:none}
.dl{font-size:13px;color:#888}
.dv{font-size:13px;font-weight:600;text-align:right}
.bigval{font-size:26px;font-weight:700;margin-bottom:3px}
.bigpnl{font-size:15px;font-weight:600;margin-bottom:12px}
.act-btns{display:flex;gap:8px;margin-bottom:12px}
.act-btn{flex:1;padding:11px 6px;border-radius:11px;font-size:12px;font-weight:600;cursor:pointer;border:none;white-space:nowrap;text-align:center}
.btn-g{background:#f0fdf4;color:#16a34a}
.btn-b{background:#eef2ff;color:#4f46e5}
.btn-r{background:#fef2f2;color:#dc2626}
/* 인라인 폼 */
.iform{background:#f9f9ff;border-radius:11px;padding:14px;margin-bottom:12px}
.iform-t{font-size:13px;font-weight:700;color:#4f46e5;margin-bottom:10px}
.irow2{display:flex;gap:8px;margin-bottom:8px}
.ifg{flex:1;min-width:0}
.ifl{font-size:11px;color:#888;margin-bottom:3px}
.iinp{width:100%;padding:9px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;color:#1c1c1e;background:#fff}
.iinp:focus{border-color:#4f46e5}
.isel{width:100%;padding:9px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;background:#fff;color:#1c1c1e}
.iprev{font-size:12px;color:#4f46e5;min-height:15px;margin-bottom:5px}
.iconfirm{width:100%;padding:11px;border-radius:9px;border:none;background:#4f46e5;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
/* 매수 내역 */
.ph-row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid #f5f5f5}
.ph-row:last-child{border:none}
/* 배당 내역 */
.div-row{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.div-row:last-child{border:none}
/* 시뮬 */
.sim-wrap{padding:14px}
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.sim-card{background:#fff;border-radius:13px;padding:13px 14px;border:1px solid #f0f0f0}
.sim-lbl{font-size:11px;color:#aaa;margin-bottom:4px}
.sim-val{font-size:17px;font-weight:700}
.bar-bg{background:#f0f0f0;border-radius:4px;height:5px;margin-top:4px}
.bar-fill{height:5px;border-radius:4px}
.mbars{display:flex;align-items:flex-end;gap:3px;height:70px;margin-bottom:6px}
.mcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.mbar{width:100%;border-radius:2px 2px 0 0}
.mlbl{font-size:8px;color:#aaa}
.mpills{display:flex;flex-wrap:wrap;gap:5px}
.mpill{font-size:11px;padding:3px 8px;border-radius:6px}
/* 차트 */
.ccard{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px}
.cttl{font-size:12px;color:#888;font-weight:600;margin-bottom:10px}
.lrow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.ldot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.lnm{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.lpc{font-weight:600;font-size:13px;min-width:38px;text-align:right}
.lvl{font-size:12px;color:#888;min-width:60px;text-align:right}
/* 모달 */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center}
.ov.on{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:22px 18px 44px;width:100%;max-width:480px;max-height:93vh;overflow-y:auto}
.m-ttl{font-weight:700;font-size:17px;margin-bottom:14px}
.acct-btns{display:flex;gap:8px;margin-bottom:4px}
.acct-btn{flex:1;padding:12px 4px;border-radius:10px;border:2px solid #e0e0e0;background:#fff;color:#888;font-size:14px;font-weight:600;cursor:pointer}
.acct-hint{font-size:11px;text-align:center;margin-bottom:14px;min-height:15px}
.srch-wrap{position:relative;margin-bottom:11px}
.srch-lbl{font-size:12px;color:#888;margin-bottom:4px}
.srch-inp{width:100%;padding:11px 12px;border:1.5px solid #e0e0e0;border-radius:9px;font-size:14px;outline:none;color:#1c1c1e}
.srch-inp:focus{border-color:#4f46e5}
.srch-dd{position:absolute;top:calc(100% + 3px);left:0;right:0;background:#fff;border:1px solid #e0e0e0;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:200;max-height:220px;overflow-y:auto;display:none}
.srch-dd.on{display:block}
.dd-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f5f5f5;-webkit-tap-highlight-color:transparent}
.dd-item:last-child{border:none}
.dd-item:hover{background:#f9f9f9}
.dd-nm{font-size:13px;font-weight:600}
.dd-sub{font-size:11px;color:#aaa;margin-top:2px}
.form-row{display:flex;gap:9px;margin-bottom:11px}
.form-row .fg{flex:1;min-width:0}
.fg{margin-bottom:11px}
.fl{font-size:12px;color:#888;margin-bottom:4px}
.fw{display:flex;align-items:center;border:1.5px solid #e0e0e0;border-radius:9px;background:#fff}
.fw:focus-within{border-color:#4f46e5}
.fw input,.fw select{flex:1;padding:11px 10px;border:none;background:transparent;font-size:14px;outline:none;min-width:0;color:#1c1c1e}
.fw .su{padding-right:10px;font-size:12px;color:#aaa}
.hint{background:#eef2ff;border-radius:9px;padding:9px 12px;font-size:12px;color:#4f46e5;margin-bottom:14px;line-height:1.5}
.mbtns{display:flex;gap:9px}
.mbcn{flex:1;padding:13px;border-radius:10px;border:1px solid #e0e0e0;background:#f5f5f5;font-size:14px;cursor:pointer;color:#333}
.mbsb{flex:2;padding:13px;border-radius:10px;border:none;background:#4f46e5;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
/* 로딩 */
#gld{position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.gspin{width:36px;height:36px;border-radius:50%;border:3px solid #c7d2fe;border-top-color:#4f46e5;animation:sp .75s linear infinite}
.spin-sm{display:inline-block;width:10px;height:10px;border:2px solid #c7d2fe;border-top-color:#4f46e5;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle}
@keyframes sp{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<div id="gld">
  <div class="gspin"></div>
  <div id="g-msg" style="font-size:13px;color:#4f46e5;font-weight:500;text-align:center;max-width:240px;line-height:1.5"></div>
  <button onclick="forceClose()" style="padding:8px 20px;border-radius:8px;border:1px solid #c7d2fe;background:#fff;color:#4f46e5;font-size:13px;cursor:pointer;margin-top:4px">✕ 닫기</button>
</div>

<!-- 메인 -->
<div id="pg-main">
  <div class="hdr">
    <div class="hdr-top">
      <span class="hdr-lbl">총 자산</span>
      <div class="hdr-actions">
        <button class="hdr-btn" id="rf-btn" onclick="refreshAll()" title="전체 업데이트">↻</button>
        <button class="hdr-btn" onclick="openMenu()" title="메뉴">☰</button>
        <button class="hdr-btn" onclick="openAdd()">＋</button>
      </div>
    </div>
    <div class="h-total" id="h-total">0원</div>
    <div class="h-pnl" id="h-pnl"></div>
    <div class="h-sub" id="h-sub"></div>
    <div class="h-div" id="h-div"></div>
    <div class="h-upd" id="h-upd"></div>
    <div class="itabs">
      <button class="itab on" id="t-hold" onclick="goTab('hold')"><span>📊</span><span>보유</span></button>
      <button class="itab" id="t-sim" onclick="goTab('sim')"><span>🪙</span><span>배당</span></button>
      <button class="itab" id="t-pie" onclick="goTab('pie')"><span>📈</span><span>비중</span></button>
    </div>
  </div>

  <div id="p-hold">
    <div class="sec">
      <div class="sort-bar">
        <button class="stab on" id="s-v" onclick="setSort('v')">평가액순</button>
        <div class="sdiv"></div>
        <button class="stab" id="s-p" onclick="setSort('p')">수익순</button>
        <div class="fbtns">
          <div class="fbtn on" id="f-a" onclick="setFlt('a')">전체</div>
          <div class="fbtn fbtn-n" id="f-n" onclick="setFlt('n')">일반주</div>
          <div class="fbtn fbtn-d" id="f-d" onclick="setFlt('d')">배당주</div>
          <div class="fbtn fbtn-h" id="f-h" onclick="setFlt('h')">고배당</div>
        </div>
      </div>
      <div class="slist" id="s-list"></div>
      <div class="empty" id="s-empty">
        <div style="font-size:40px;margin-bottom:10px">📊</div>
        <div style="font-size:14px;color:#555;margin-bottom:5px">＋ 버튼으로 종목을 추가하세요</div>
        <div style="font-size:12px;color:#d97706">Naver·Yahoo·Finnhub 실시간 가격</div>
      </div>
      <div class="add-wrap"><button class="add-btn" onclick="openAdd()">＋ 종목 추가</button></div>
    </div>
  </div>
  <div id="p-sim" style="display:none"><div class="sim-wrap" id="sim-cont"></div></div>
  <div id="p-pie" style="display:none">
    <div style="padding:14px" id="pie-wrap"></div>
  </div>
</div>

<!-- 상세 -->
<div class="det" id="pg-det">
  <div class="det-hdr">
    <button class="det-back" onclick="goBack()">←</button>
    <div class="det-title" id="det-ttl"></div>
  </div>
  <div class="det-body" id="det-body"></div>
</div>

<!-- 메뉴 모달 -->
<div class="ov" id="ov-menu">
  <div class="modal" onclick="event.stopPropagation()" style="padding-bottom:32px">
    <div class="m-ttl">데이터 관리</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      <button onclick="exportData()" style="padding:15px;border-radius:12px;border:1.5px solid #4f46e5;background:#eef2ff;color:#4f46e5;font-size:15px;font-weight:600;cursor:pointer;text-align:left">
        📤 데이터 내보내기
        <div style="font-size:12px;color:#888;font-weight:400;margin-top:3px">JSON 파일로 저장 · 백업용</div>
      </button>
      <button onclick="document.getElementById('imp-file').click()" style="padding:15px;border-radius:12px;border:1.5px solid #16a34a;background:#f0fdf4;color:#16a34a;font-size:15px;font-weight:600;cursor:pointer;text-align:left">
        📥 데이터 불러오기
        <div style="font-size:12px;color:#888;font-weight:400;margin-top:3px">JSON 파일에서 복원 · 기기 이동시</div>
      </button>
      <input type="file" id="imp-file" accept=".json" style="display:none" onchange="importData(this)">
      <div style="background:#fff7ed;border-radius:10px;padding:12px 14px;font-size:12px;color:#92400e;line-height:1.6">
        💡 캐시 삭제 전에 <b>내보내기</b>로 파일 저장해두세요.<br>
        다른 기기에서 쓸 때도 파일 전송 후 <b>불러오기</b> 하면 됩니다.
      </div>
      <button onclick="closeMenu()" style="padding:13px;border-radius:12px;border:1px solid #e0e0e0;background:#f5f5f5;font-size:14px;cursor:pointer;color:#555;margin-top:4px">닫기</button>
    </div>
  </div>
</div>

<!-- 추가 모달 -->
<div class="ov" id="ov-add">
  <div class="modal" onclick="event.stopPropagation()">
    <div class="m-ttl">종목 추가</div>
    <div class="acct-btns">
      <button id="ab-n" class="acct-btn" onclick="setAcct('n')">일반계좌</button>
      <button id="ab-i" class="acct-btn" onclick="setAcct('i')">ISA</button>
      <button id="ab-r" class="acct-btn" onclick="setAcct('r')">IRP</button>
    </div>
    <div class="acct-hint" id="acct-hint"></div>
    <div class="srch-wrap">
      <div class="srch-lbl">종목명</div>
      <input id="srch-inp" class="srch-inp" placeholder="삼성전자, JEPQ, CONY…" autocomplete="off">
      <div class="srch-dd" id="srch-dd"></div>
    </div>
    <div class="form-row">
      <div class="fg"><div class="fl">평균 매수가 *</div><div class="fw"><input id="f-avg" type="number" inputmode="numeric" placeholder="50000"><span class="su">원</span></div></div>
      <div class="fg"><div class="fl">수량 *</div><div class="fw"><input id="f-qty" type="number" inputmode="numeric" placeholder="100"><span class="su">주</span></div></div>
    </div>
    <div class="fg"><div class="fl">매수 날짜</div><div class="fw"><input id="f-date" type="date" style="color:#1c1c1e"></div></div>
    <div class="hint">추가 즉시 실시간 가격과 배당 내역을 자동 조회합니다.</div>
    <div class="mbtns">
      <button class="mbcn" onclick="closeAdd()">취소</button>
      <button class="mbsb" onclick="submitAdd()">추가하기</button>
    </div>
  </div>
</div>

<script>
/* ── 상수 ── */
const FK='d7cp7hhr01qv03et7mg0d7cp7hhr01qv03et7mgg';
const CC=['#4f46e5','#16a34a','#d97706','#dc2626','#0891b2','#7c3aed','#db2777','#059669','#ea580c','#0f766e'];

const AL={n:'일반계좌',i:'ISA (절세)',r:'IRP (절세)'};

  {n:'삼성전자',s:'005930.KS',dy:2.5,df:'분기배당'},{n:'SK하이닉스',s:'000660.KS',dy:0.8,df:'분기배당'},
  {n:'현대차',s:'005380.KS',dy:3.5,df:'분기배당'},{n:'기아',s:'000270.KS',dy:4.0,df:'분기배당'},
  {n:'카카오',s:'035720.KS',dy:0,df:'없음'},{n:'네이버',s:'035420.KS',dy:0.3,df:'연배당'},
  {n:'POSCO홀딩스',s:'005490.KS',dy:3.0,df:'분기배당'},{n:'KB금융',s:'105560.KS',dy:5.0,df:'분기배당'},
  {n:'신한지주',s:'055550.KS',dy:4.5,df:'분기배당'},{n:'하나금융지주',s:'086790.KS',dy:5.5,df:'분기배당'},
  {n:'셀트리온',s:'068270.KS',dy:0.5,df:'연배당'},{n:'LG화학',s:'051910.KS',dy:1.5,df:'분기배당'},
  {n:'LG에너지솔루션',s:'373220.KS',dy:0,df:'없음'},{n:'삼성바이오로직스',s:'207940.KS',dy:0,df:'없음'},
  {n:'KODEX 200',s:'069500.KS',dy:1.5,df:'분기배당'},{n:'KODEX 미국S&P500',s:'379810.KS',dy:1.2,df:'분기배당'},
  {n:'KODEX 미국배당커버드콜',s:'379800.KS',dy:12.0,df:'월배당'},

/* ── 유틸 ── */
function fmt(n){n=Math.round(n||0);const a=Math.abs(n),s=n<0?'-':'';if(a>=100000000)return s+(a/100000000).toFixed(1)+'억원';if(a>=10000)return s+Math.round(a/10000)+'만원';return n.toLocaleString()+'원'}
function fN(n){return Math.round(n||0).toLocaleString()}
function dvN(df){return df==='월배당'?12:df==='분기배당'?4:df==='반기배당'?2:1}
function isKR(s){return s&&(s.endsWith('.KS')||s.endsWith('.KQ'))}
function toSym(n){const d=DB.find(x=>x.n===n);return d?d.s:(n.match(/^\d{6}$/)?n+'.KS':n.toUpperCase())}
function ab(n){const r=n.replace(/\s+/g,'');return(r.length<=3?r:r.slice(0,2)).toUpperCase()}
function ci(id){return Math.max(0,D.h.findIndex(x=>x.id===id))}
function tax(h){return(h.acct==='i'||h.acct==='r')?0:0.154}
function korDate(){return new Date(Date.now()+9*3600000).toISOString().split('T')[0]}
function dvCat(dy){return dy>=10?'h':dy>=4?'d':'n'}

/* ── 가격 API ── */
const PX=[u=>'https://corsproxy.io/?'+encodeURIComponent(u),u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),u=>'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u)];
function tout(p,ms=7000){return Promise.race([p,new Promise((_,r)=>setTimeout(()=>r('to'),ms))])}
async function naverP(code){
  const urls=[`https://m.stock.naver.com/api/stock/${code}/basic`,`https://polling.finance.naver.com/api/realtime/domestic/stock/${code}`];
  return tout(Promise.any(urls.flatMap(u=>PX.map(px=>fetch(px(u)).then(r=>{if(!r.ok)throw 0;return r.text()}).then(t=>{const s=t.includes('"contents"')?JSON.parse(t).contents:t;const j=JSON.parse(s);const p=j?.closePrice||j?.currentPrice||j?.stockInfo?.closePrice||(j?.result?.siseArray||[])[0]?.closePrice;if(!p)throw 0;const n=parseFloat(String(p).replace(/,/g,''));if(n>0)return n;throw 0;})))));
}
async function yahooP(sym){
  const urls=[`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`,`https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`,`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(sym)}`,`https://query2.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(sym)}`];
  return tout(Promise.any(urls.flatMap(u=>PX.map(px=>fetch(px(u)).then(r=>{if(!r.ok)throw 0;return r.text()}).then(t=>{try{const s=t.includes('"contents"')?JSON.parse(t).contents:t;const j=JSON.parse(s);const p=j?.chart?.result?.[0]?.meta?.regularMarketPrice||j?.quoteResponse?.result?.[0]?.regularMarketPrice;if(p&&p>0)return p;}catch{}throw 0;})))));
}
async function fhP(sym){const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${FK}`);if(!r.ok)throw 0;const j=await r.json();if(!j.c||j.c<=0)throw 0;return j.c;}
async function getRate(){try{const r=await tout(fetch('https://api.frankfurter.app/latest?from=USD&to=KRW'),4000);const j=await r.json();if(j?.rates?.KRW>100)D.rate=Math.round(j.rates.KRW);}catch{}}
async function getPrice(sym){
  if(isKR(sym)){try{return Math.round(await naverP(sym.replace(/\.K[SQ]$/,'')))}catch{}try{return Math.round(await yahooP(sym))}catch{}throw new Error('fail');}
  try{return Math.round((await tout(fhP(sym),5000))*D.rate)}catch{}try{return Math.round((await yahooP(sym))*D.rate)}catch{}throw new Error('fail');
}
async function getDivs(sym){
  const now=Math.floor(Date.now()/1000),p1=now-400*86400;
  try{
    const txt=await tout(Promise.any([`https://query1.finance.yahoo.com/v7/finance/download/${encodeURIComponent(sym)}?period1=${p1}&period2=${now}&interval=1d&events=div`,`https://query2.finance.yahoo.com/v7/finance/download/${encodeURIComponent(sym)}?period1=${p1}&period2=${now}&interval=1d&events=div`].flatMap(u=>PX.map(px=>fetch(px(u)).then(r=>{if(!r.ok)throw 0;return r.text()}).then(t=>{if(!t.includes(','))throw 0;return t;})))),8000);
    const rows=txt.trim().split('\n').slice(1).filter(l=>l.includes(',')).map(l=>{const[d,a]=l.split(',');return{date:d.trim(),amount:parseFloat(a)||0}}).filter(x=>x.amount>0).sort((a,b)=>b.date.localeCompare(a.date));
    if(rows.length)return rows;
  }catch{}
  try{
    const txt=await tout(Promise.any([`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2y&events=div`,`https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2y&events=div`].flatMap(u=>PX.map(px=>fetch(px(u)).then(r=>{if(!r.ok)throw 0;return r.text()})))),8000);
    const s=txt.includes('"contents"')?JSON.parse(txt).contents:txt;
    const ev=JSON.parse(s)?.chart?.result?.[0]?.events?.dividends;
    if(ev){const rows=Object.values(ev).filter(d=>d.date>p1).map(d=>({date:new Date(d.date*1000).toISOString().split('T')[0],amount:parseFloat(d.amount.toFixed(4))})).sort((a,b)=>b.date.localeCompare(a.date));if(rows.length)return rows;}
  }catch{}
  return[];
}
function calcDy(h){
  if(!h.divHistory||!h.divHistory.length)return null;
  const tot=h.divHistory.reduce((s,d)=>s+(d.amount||0),0);
  const totKRW=isKR(h.sym||'')?tot:Math.round(tot*D.rate);
  const cur=h.cur||h.avg;if(!cur||!totKRW)return null;
  const dy=parseFloat((totKRW/cur*100).toFixed(2));
  const cnt=h.divHistory.length;
  const df=cnt>=10?'월배당':cnt>=3?'분기배당':cnt>=2?'반기배당':'연배당';
  return{dy,df};
}

/* ── 조회 액션 ── */
async function fetchPrice(id){
  const h=D.h.find(x=>x.id===id);if(!h)return;
  LDS.add(id);render();
  try{const p=await getPrice(h.sym||toSym(h.n));D.h=D.h.map(x=>x.id===id?{...x,cur:p,err:0}:x);D.at=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});sv();}
  catch{D.h=D.h.map(x=>x.id===id?{...x,err:1}:x);}
  LDS.delete(id);render();
}
async function fetchDivs(id){
  const h=D.h.find(x=>x.id===id);if(!h)return;
  if(h.divHistory&&h.divAt&&Date.now()-h.divAt<86400000)return;
  LDS.add(id);render();
  try{
    const rows=await getDivs(h.sym||toSym(h.n));
    const upd={...D.h.find(x=>x.id===id),divHistory:rows,divAt:Date.now()};
    const calc=calcDy(upd);if(calc){upd.dy=calc.dy;upd.df=calc.df;}
    D.h=D.h.map(x=>x.id===id?upd:x);sv();
  }catch{D.h=D.h.map(x=>x.id===id?{...x,divHistory:[]}:x);}
  LDS.delete(id);render();
}
async function refreshAll(){
  if(BUSY||!D.h.length)return;
  BUSY=true;setBusy(true);showG('환율 조회 중...');

  for(let i=0;i<D.h.length;i++){

    try{const p=await getPrice(h.sym||toSym(h.n));D.h=D.h.map(x=>x.id===h.id?{...x,cur:p,err:0}:x);}
    catch{D.h=D.h.map(x=>x.id===h.id?{...x,err:1}:x);}
    LDS.delete(h.id);
  }
  D.at=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  sv();hideG();setBusy(false);BUSY=false;render();
}

function render(){
  const H=D.h;
  const tv=H.reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);
  const tc=H.reduce((s,h)=>h.avgCost*h.qty+s,0);
  const pnl=tv-tc,pct=tc>0?pnl/tc*100:0;
  const dv=H.filter(h=>h.dy>=4);
  const md=dv.reduce((s,h)=>{const a=(h.cur||h.avg)*h.qty*h.dy/100*(1-tax(h));return s+a/dvN(h.df);},0);
  const nv=H.filter(h=>h.dy<3).reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);
  const dval=H.filter(h=>h.dy>=4&&h.dy<10).reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);
  const hval=H.filter(h=>h.dy>=10).reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);

  document.getElementById('h-total').textContent=fmt(tv);
  const pe=document.getElementById('h-pnl');
  pe.textContent=H.length?`${pnl>=0?'+':''}${fmt(pnl)} (${pct>=0?'+':''}${pct.toFixed(2)}%) 총 수익`:'';
  pe.className='h-pnl '+(pnl>=0?'pos':'neg');
  document.getElementById('h-sub').textContent=H.length?`일반주 ${fmt(nv)} · 배당주 ${fmt(dval)} · 고배당 ${fmt(hval)}`:'';
  const de=document.getElementById('h-div');
  if(md>0){de.style.display='block';de.textContent=`🪙 월 세후 배당 ${fmt(md)}`;}else de.style.display='none';
  document.getElementById('h-upd').textContent=D.at?`업데이트 ${D.at} · USD/KRW ${fN(D.rate)}원`:'';
  document.getElementById('s-empty').style.display=H.length?'none':'block';

  let fil=H.filter(h=>FLT==='a'?true:FLT==='h'?h.dy>=10:FLT==='d'?(h.dy>=4&&h.dy<10):h.dy<4);
  if(SORT==='v')fil=[...fil].sort((a,b)=>(b.cur||b.avg)*b.qty-(a.cur||a.avg)*a.qty);
  else fil=[...fil].sort((a,b)=>((b.cur||b.avg)-b.avgCost)*b.qty-((a.cur||a.avg)-a.avgCost)*a.qty);

  document.getElementById('s-list').innerHTML=fil.map(h=>{
    const idx=ci(h.id),cur=h.cur||h.avg,val=cur*h.qty;
    const pp=(cur-h.avgCost)*h.qty,pp2=(cur-h.avgCost)/h.avgCost*100;
    const isLd=LDS.has(h.id);
    const cat=dvCat(h.dy);
    const bdgStyle=cat==='h'?'background:#fff7ed;color:#d97706':cat==='d'?'background:#f0fdf4;color:#16a34a':'';
    const bdgTxt=cat==='h'?'고배당':cat==='d'?'배당주':'';
    return `<div class="srow" onclick="goDet(${h.id})">
  <div class="sico" style="background:${CC[idx%CC.length]}">${ab(h.n)}</div>
  <div class="s-info">
    <div class="s-nm">${h.n}${bdgTxt?`<span class="bdg" style="${bdgStyle}">${bdgTxt}</span>`:''}</div>
    <div class="s-sub">${fN(h.qty)}주 · ${isLd?'<span class="spin-sm"></span> 조회중':fN(cur)+'원'}${h.err?' · <span style="color:#dc2626">실패</span>':''}</div>
  </div>
  <div class="s-right">
    <div class="s-val">${fmt(val)}</div>
    <div class="s-pnl ${pp>=0?'pos':'neg'}">${pp>=0?'+':''}${fmt(pp)}<br><span style="font-size:10px">(${pp2>=0?'+':''}${pp2.toFixed(1)}%)</span></div>
  </div>
</div>`;
  }).join('');

  if(TAB==='sim')renderSim();

}

function updPrev(id){
  const h=D.h.find(x=>x.id===id);if(!h)return;
  const q=parseInt(document.getElementById('bq')?.value)||0,a=parseFloat(document.getElementById('ba')?.value)||0;
  const p=document.getElementById('b-prev');
  if(p&&q>0&&a>0){const nq=h.qty+q,na=Math.round((h.avgCost*h.qty+a*q)/nq);p.textContent=`매수 후 → ${fN(nq)}주 · 평단 ${fN(na)}원`;}
  else if(p)p.textContent='';
}
function confirmBuy(id){
  const q=parseInt(document.getElementById('bq')?.value)||0,a=parseFloat(document.getElementById('ba')?.value)||0;
  const dt=document.getElementById('bd')?.value||'',ac=document.getElementById('bac')?.value||'n';
  if(!q||!a){alert('수량과 단가를 입력해주세요');return;}
  D.h=D.h.map(h=>{
    if(h.id!==id)return h;
    const nq=h.qty+q,na=Math.round((h.avgCost*h.qty+a*q)/nq);
    return{...h,qty:nq,avgCost:na,avg:na,acct:ac,purchases:[...(h.purchases||[]),{pid:Date.now(),date:dt,qty:q,avg:a,acct:ac}]};
  });
  sv();SBUY=false;renderDet(id);render();
}
function savePH(id,pid){
  const q=parseInt(document.getElementById('eq')?.value)||0,a=parseFloat(document.getElementById('ea')?.value)||0;
  const dt=document.getElementById('ed')?.value||'',ac=document.getElementById('eac')?.value||'n';
  if(!q||!a){alert('수량과 단가를 입력해주세요');return;}
  D.h=D.h.map(h=>{
    if(h.id!==id)return h;
    const purchases=(h.purchases||[]).map(p=>p.pid===pid?{...p,qty:q,avg:a,date:dt,acct:ac}:p);
    const tot=purchases.reduce((s,p)=>s+p.qty,0);
    const avgC=tot>0?Math.round(purchases.reduce((s,p)=>s+p.avg*p.qty,0)/tot):0;
    return{...h,purchases,qty:tot,avgCost:avgC,avg:avgC};
  });
  EDIT_PID=null;sv();renderDet(id);render();
}
function delPH(id,pid){
  const h=D.h.find(x=>x.id===id);if(!h)return;
  const purchases=(h.purchases||[]).filter(p=>p.pid!==pid);
  if(!purchases.length){if(!confirm('마지막 매수 내역입니다. 종목을 삭제할까요?'))return;delH(id);return;}
  const tot=purchases.reduce((s,p)=>s+p.qty,0);
  const avgC=Math.round(purchases.reduce((s,p)=>s+p.avg*p.qty,0)/tot);
  D.h=D.h.map(x=>x.id===id?{...x,purchases,qty:tot,avgCost:avgC,avg:avgC}:x);
  EDIT_PID=null;sv();renderDet(id);render();
}
function delH(id){
  const h=D.h.find(x=>x.id===id);if(!h||!confirm(h.n+' 삭제할까요?'))return;
  D.h=D.h.filter(x=>x.id!==id);sv();goBack();
}

/* ── 원형 와플 차트 ── */
function renderPie(){
  const H=D.h,wrap=document.getElementById('pie-wrap');
  if(!H.length){wrap.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:10px">📈</div><div>종목을 추가하면 비중이 표시됩니다</div></div>';return;}
  const tv=H.reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);
  const sorted=[...H].sort((a,b)=>(b.cur||b.avg)*b.qty-(a.cur||a.avg)*a.qty);

  /* 원형 와플 - 동심원 배열 */
  const TOTAL_DOTS=80;
  const dots=[];
  /* 각 종목에 dot 수 배분 */
  const shares=sorted.map(h=>{const v=(h.cur||h.avg)*h.qty;return{h,v,p:v/tv,dots:0};});
  let assigned=0;
  shares.forEach((s,i)=>{
    const n=i===shares.length-1?TOTAL_DOTS-assigned:Math.round(s.p*TOTAL_DOTS);
    s.dots=Math.max(n,1);assigned+=s.dots;
  });
  /* 전체 dot 배열 생성 */
  shares.forEach(s=>{for(let i=0;i<s.dots;i++)dots.push({color:CC[H.indexOf(s.h)%CC.length],name:s.h.n});});

  /* 동심원 배치 - 바깥→안쪽, 비중 큰 순서 */
  /* 각 원의 도트 수: r=1:8, r=2:16, r=3:24 ... */
  const rings=[{r:5,n:32},{r:4,n:24},{r:3,n:16},{r:2,n:8}]; /* 총 80 */
  const SIZE=260, CX=130, CY=130;
  let dotIdx=0;
  const placements=[];
  rings.forEach(ring=>{
    for(let i=0;i<ring.n;i++){
      const angle=(2*Math.PI*i/ring.n)-(Math.PI/2);
      const r=ring.r*22;
      placements.push({x:CX+r*Math.cos(angle),y:CY+r*Math.sin(angle),dot:dots[dotIdx]||{color:'#e8e8e8',name:''}});
      dotIdx++;
    }
  });

  const svgDots=placements.map(p=>{
    const r=p.dot.color==='#e8e8e8'?5:7;
    return `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="${r}" fill="${p.dot.color}" opacity="0.9"/>`;
  }).join('');

  const legendHTML=sorted.map((h,i)=>{
    const v=(h.cur||h.avg)*h.qty,pct=tv>0?v/tv*100:0;
    const idx=H.indexOf(h);
    return `<div class="lrow">
  <div class="ldot" style="background:${CC[idx%CC.length]};width:10px;height:10px;border-radius:50%"></div>
  <div class="lnm">${h.n}</div>
  <div style="font-size:13px;font-weight:700;min-width:40px;text-align:right">${pct.toFixed(1)}%</div>
  <div style="font-size:12px;color:#888;min-width:60px;text-align:right">${fmt(v)}</div>
</div>`;
  }).join('');

  wrap.innerHTML=`
<div class="ccard" style="text-align:center">
  <div class="cttl" style="text-align:left">포트폴리오 비중</div>
  <svg width="${SIZE}" height="${SIZE}" viewBox="0 0 ${SIZE} ${SIZE}" style="max-width:100%;display:block;margin:0 auto">
    ${svgDots}
    <text x="${CX}" y="${CY-8}" text-anchor="middle" font-size="12" fill="#888">총 자산</text>
    <text x="${CX}" y="${CY+12}" text-anchor="middle" font-size="16" font-weight="700" fill="#1c1c1e">${fmt(tv)}</text>
  </svg>
</div>
<div class="ccard">
  <div class="cttl">종목 비중</div>
  ${legendHTML}
  <div style="border-top:1px solid #f0f0f0;padding-top:8px;margin-top:4px;display:flex;justify-content:space-between">
    <span style="font-size:13px;font-weight:600">합계</span>
    <span style="font-size:13px;font-weight:700;color:#4f46e5">${fmt(tv)}</span>
  </div>
</div>`;
}

async function krSearch(q){
  /* 네이버 금융 검색 - 한국어 종목명 + 배당 내역 호환 심볼 */
  const endpoints=[
    'https://ac.finance.naver.com/ac?q='+encodeURIComponent(q)+'&q_enc=UTF-8&st=111&sug=1&u1=1&u2=1&u3=1&u4=1&r_format=json&limit=15',
    'https://m.stock.naver.com/api/search/all?query='+encodeURIComponent(q)+'&page=1&pageSize=15',
  ];
  for(var ei=0;ei<endpoints.length;ei++){
    try{
      var url=endpoints[ei];
      var txt=await tout(Promise.any(PX.map(function(px){return fetch(px(url)).then(function(r){if(!r.ok)throw 0;return r.text();});})),5000);
      var raw=txt;
      if(txt.includes('"contents"'))raw=JSON.parse(txt).contents;
      var j=JSON.parse(raw);
      var results=[];

      /* 포맷 1: ac.finance.naver.com → {items:[[["코드","이름","타입"],...]]} */
      if(j&&j.items&&j.items[0]&&j.items[0].length){
        results=j.items[0].slice(0,12).map(function(it){
          var code=String(it[0]),name=String(it[1]);
          var sym=code+'.KS';
          var dbI=DB.find(function(d){return d.s===sym||d.n===name;});
          return dbI?Object.assign({},dbI,{kr:true}):{n:name,s:sym,dy:0,df:'없음',kr:true};
        });
      }

      /* 포맷 2: m.stock.naver.com → {result:{d:[{cd,nm}]}} 또는 {stocks:[{itemCode,stockName}]} */
      if(!results.length&&j&&j.result){
        var arr=j.result.d||j.result.stocks||j.result.items||[];
        results=arr.slice(0,12).map(function(it){
          var code=it.cd||it.itemCode||it.code||'';
          var name=it.nm||it.stockName||it.name||code;
          var sym=code+'.KS';
          var dbI=DB.find(function(d){return d.s===sym||d.n===name;});
          return dbI?Object.assign({},dbI,{kr:true}):{n:name,s:sym,dy:0,df:'없음',kr:true};
        }).filter(function(x){return x.n&&x.s!=='.KS';});
      }

      /* 포맷 3: 배열 직접 [{stockName,itemCode}] */
      if(!results.length&&Array.isArray(j)){
        results=j.slice(0,12).map(function(it){
          var code=it.itemCode||it.code||it.cd||'';
          var name=it.stockName||it.name||it.nm||code;
          var sym=code+'.KS';
          var dbI=DB.find(function(d){return d.s===sym||d.n===name;});
          return dbI?Object.assign({},dbI,{kr:true}):{n:name,s:sym,dy:0,df:'없음',kr:true};
        }).filter(function(x){return x.n&&x.s!=='.KS';});
      }

      if(results.length)return results;
    }catch(e){}
  }
  return[];
}


async function fhSearch(q){
  try{
    const r=await fetch('https://finnhub.io/api/v1/search?q='+encodeURIComponent(q)+'&token='+FK);
    if(!r.ok)return[];
    const j=await r.json();
    return(j.result||[]).filter(function(x){return['ETP','Common Stock','ETF'].includes(x.type)&&!x.symbol.includes('.');}).slice(0,8).map(function(x){return{n:x.description||x.displaySymbol,s:x.symbol,dy:0,df:'없음',api:true};});
  }catch(e){return[];}
}

function isKR(q){return /[\uAC00-\uD7A3]/.test(q)||/^\d{4,6}$/.test(q.trim());}

function doSearch(q){
  const dd=document.getElementById('srch-dd');
  if(!q||!q.trim()){closeDD();return;}
  const myId=++_sid;
  const ql=q.toLowerCase().replace(/\s+/g,'');
  const local=DB.filter(function(x){return x.n.toLowerCase().replace(/\s+/g,'').includes(ql)||x.s.toLowerCase().includes(ql);}).slice(0,10);

  /* 6자리 코드 직접 입력시 즉시 옵션 표시 */
  const is6=(/^\d{6}$/).test(q.trim());
  if(is6){
    const direct={n:'종목코드 '+q.trim(),s:q.trim()+'.KS',dy:0,df:'없음',kr:true,direct:true};
    SRCH=[direct,...local];
    renderDD(SRCH);
  }else{
    SRCH=local.slice();
    if(SRCH.length)renderDD(SRCH);
    else{dd.innerHTML='<div style="padding:12px 14px;font-size:12px;color:#aaa;text-align:center"><span class="spin-sm"></span> 검색 중...</div>';dd.className='srch-dd on';}
  }
  if(_stimer)clearTimeout(_stimer);
  _stimer=setTimeout(async function(){
    const useKR=true;  /* 항상 국내 검색 */
    const useUS=!isKR(q);  /* 영문일 때만 미국 검색 */
    const [krRes,usRes]=await Promise.all([
      useKR?krSearch(q):Promise.resolve([]),
      useUS?fhSearch(q):Promise.resolve([]),
    ]);
    if(_sid!==myId)return;
    const localSyms=new Set(local.map(function(x){return x.s.toUpperCase();}));
    const krMerged=krRes.map(function(x){const dbI=DB.find(function(d){return d.s===x.s||d.n===x.n;});return dbI?Object.assign({},dbI,{kr:true}):x;}).filter(function(x){return!localSyms.has(x.s.toUpperCase());});
    const krSyms=new Set(krMerged.map(function(x){return x.s.toUpperCase();}));
    const usMerged=usRes.filter(function(x){return!localSyms.has(x.s.toUpperCase())&&!krSyms.has(x.s.toUpperCase());});
    const merged=local.concat(krMerged).concat(usMerged).slice(0,25);
    SRCH=merged;
    if(SRCH.length)renderDD(SRCH);
    else{dd.innerHTML='<div style="padding:12px 14px;font-size:12px;color:#aaa;text-align:center">검색 결과 없음</div>';dd.className='srch-dd on';}
  },400);
}

function closeDD(){
  _sid++;
  if(_stimer){clearTimeout(_stimer);_stimer=null;}
  const dd=document.getElementById('srch-dd');
  if(dd){dd.className='srch-dd';dd.innerHTML='';}
  SRCH=[];
}

function pickDD(x){
  const inp=document.getElementById('srch-inp');
  if(x.direct){
    /* 6자리 코드 직접 입력 - 코드를 이름으로 저장 후 심볼로 처리 */
    inp.value=x.s.replace('.KS','');
  }else if(x.kr){
    inp.value=x.n;
  }else if(x.api){
    inp.value=x.s;
  }else{
    inp.value=x.n;
  }
  closeDD();
  setTimeout(function(){const el=document.getElementById('f-avg');if(el)el.focus();},30);
}
/* 드롭다운 이벤트 - touchstart + mousedown 둘 다 */
let _dddown=false;
function initDD(){
  const dd=document.getElementById('srch-dd');
  const inp=document.getElementById('srch-inp');
  if(!dd||!inp)return;
  function onSelect(e){
    const item=e.target.closest('[data-i]');
    if(!item)return;
    e.preventDefault();
    e.stopPropagation();
    _dddown=true;
    const x=SRCH[parseInt(item.getAttribute('data-i'))];
    if(x)pickDD(x);
    setTimeout(()=>{_dddown=false;},300);
  }
  dd.addEventListener('touchstart',onSelect,{passive:false});
  dd.addEventListener('mousedown',onSelect);
  inp.addEventListener('input',e=>doSearch(e.target.value));
  inp.addEventListener('blur',()=>setTimeout(()=>{if(!_dddown)closeDD();},500));
  document.addEventListener('click',e=>{if(!dd.contains(e.target)&&e.target!==inp)closeDD();});
  document.addEventListener('touchstart',e=>{if(!dd.contains(e.target)&&e.target!==inp)closeDD();},{passive:true});
}

/* ── 모달 ── */
function setAcct(v){
  CACCT=v;
  [['n','n'],['i','i'],['r','r']].forEach(([bid,k])=>{const b=document.getElementById('ab-'+bid);const on=k===v;b.style.background=on?AC[k]:'#fff';b.style.color=on?'#fff':'#888';b.style.borderColor=on?AC[k]:'#e0e0e0';});
  const hint=document.getElementById('acct-hint');hint.textContent=AH[v];hint.style.color=AC[v];
}
function openAdd(){
  document.getElementById('ov-add').classList.add('on');
  document.getElementById('srch-inp').value='';
  document.getElementById('f-avg').value='';
  document.getElementById('f-qty').value='';
  document.getElementById('f-date').value=korDate();
  closeDD();setAcct('n');
  setTimeout(()=>document.getElementById('srch-inp').focus(),100);
}
function closeAdd(){document.getElementById('ov-add').classList.remove('on');closeDD();}
document.getElementById('ov-add').addEventListener('click',e=>{if(e.target===document.getElementById('ov-add'))closeAdd();});

async function submitAdd(){
  const nm=document.getElementById('srch-inp').value.trim();
  const avg=parseFloat(document.getElementById('f-avg').value);
  const qty=parseInt(document.getElementById('f-qty').value);
  const dt=document.getElementById('f-date').value;
  if(!nm||!avg||!qty){alert('종목명, 평단가, 수량을 입력해주세요');return;}
  /* DB에서 찾기 (이름 또는 심볼로) */
  /* 종목명으로 DB 찾기 */
  const dbI=DB.find(x=>x.n===nm||x.s===nm||x.s.replace(/\.K[SQ]$/,'')=== nm);
  let sym,dy,df,finalName;
  if(dbI){sym=dbI.s;dy=dbI.dy;df=dbI.df;finalName=dbI.n;}
  else if(/^\d{6}$/.test(nm)){sym=nm+'.KS';dy=0;df='없음';finalName=nm;}
  else if(/^[A-Z0-9]{1,6}$/.test(nm)){sym=nm;dy=0;df='없음';finalName=nm;}
  else{sym=toSym(nm);dy=0;df='없음';finalName=nm;}
  const id=Date.now();
  D.h.push({id,n:finalName,sym,avg,avgCost:avg,qty,cur:avg,dy,df,acct:CACCT,buyDate:dt,err:0,purchases:[{pid:id,date:dt,qty,avg,acct:CACCT}]});
  sv();closeAdd();render();
  if(!isKR(sym))await getRate();
  fetchPrice(id);
  fetchDivs(id);
}

/* ── 로딩 ── */
let _gt=null;
function showG(m){document.getElementById('gld').style.display='flex';setGMsg(m);if(_gt)clearTimeout(_gt);_gt=setTimeout(forceClose,30000);}
function setGMsg(m){document.getElementById('g-msg').textContent=m;}
function hideG(){document.getElementById('gld').style.display='none';if(_gt){clearTimeout(_gt);_gt=null;}}
function forceClose(){hideG();BUSY=false;setBusy(false);LDS.clear();render();}
function setBusy(b){const btn=document.getElementById('rf-btn');if(btn)btn.style.animation=b?'sp .75s linear infinite':'none';}

/* ── 백그라운드 배당 조회 ── */
async function prefetch(){
  for(const h of D.h){
    if(!h.divHistory||!h.divAt||Date.now()-h.divAt>86400000){
      await fetchDivs(h.id);
      await new Promise(r=>setTimeout(r,500));
    }
  }
}

/* ── 내보내기 / 불러오기 ── */
function openMenu(){document.getElementById('ov-menu').classList.add('on');}
function closeMenu(){document.getElementById('ov-menu').classList.remove('on');}
document.getElementById('ov-menu').addEventListener('click',e=>{if(e.target===document.getElementById('ov-menu'))closeMenu();});

function exportData(){
  const data=JSON.stringify(D,null,2);
  const blob=new Blob([data],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const date=new Date().toISOString().split('T')[0];
  a.href=url;
  a.download=`portfolio_${date}.json`;
  a.click();
  URL.revokeObjectURL(url);
  closeMenu();
}

function importData(input){
  const file=input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    try{
      const parsed=JSON.parse(e.target.result);
      if(!parsed.h||!Array.isArray(parsed.h)){alert('올바른 포트폴리오 파일이 아닙니다.');return;}
      if(!confirm(`종목 ${parsed.h.length}개 데이터를 불러올까요?
현재 데이터는 덮어쓰여집니다.`))return;
      D=parsed;
      /* DB 종목 dy 리셋 */
      D.h=D.h.map(h=>{const dbI=DB.find(x=>x.s===h.sym||x.n===h.n);if(dbI&&dbI.dy>0)return{...h,dy:dbI.dy,df:dbI.df};return h;});
      sv();closeMenu();render();
      alert(`✅ ${D.h.length}개 종목을 불러왔습니다!`);
    }catch{alert('파일을 읽을 수 없습니다. JSON 형식을 확인해주세요.');}
  };
  reader.readAsText(file);
  input.value='';
}

render();
initDD();
setTimeout(prefetch,2000);
