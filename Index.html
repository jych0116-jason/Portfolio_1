<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>내 포트폴리오</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#f2f2f7;color:#1c1c1e;max-width:480px;margin:0 auto;min-height:100vh}
/* 헤더 */
.hdr{background:#fff;padding:20px 18px 0}
.hdr-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.hdr-lbl{font-size:13px;color:#888}
.hdr-icons{display:flex;gap:14px}
.hdr-ic{background:none;border:none;font-size:22px;cursor:pointer;padding:2px;color:#333}
.hdr-total{font-size:32px;font-weight:700;letter-spacing:-.5px;line-height:1.1}
.hdr-pnl{font-size:14px;font-weight:500;margin-top:3px}
.hdr-info{font-size:12px;color:#888;margin-top:2px}
.hdr-divamt{font-size:13px;color:#d97706;margin-top:2px;display:none}
.pos{color:#2563eb}.neg{color:#dc2626}
/* 탭 */
.icon-tabs{display:flex;border-top:1px solid #f0f0f0;margin:12px -18px 0;padding:0}
.itab{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;cursor:pointer;padding:10px 0 12px;border:none;background:none}
.itab-ico{font-size:20px}
.itab-lbl{font-size:11px;color:#aaa}
.itab.on .itab-lbl{color:#4f46e5;font-weight:700}
/* 업데이트 바 */
.upd-bar{background:#eef2ff;padding:5px 18px;font-size:11px;color:#4f46e5;display:none}
/* 섹션 */
.sec{background:#fff;margin-top:10px}
.sort-bar{display:flex;align-items:center;padding:10px 16px;gap:6px}
.stab{font-size:13px;color:#aaa;padding:5px 9px;border-radius:7px;cursor:pointer;background:none;border:none}
.stab.on{color:#1c1c1e;font-weight:700;background:#f2f2f7}
.sdiv{width:1px;height:12px;background:#ddd}
.fbtns{margin-left:auto;display:flex;gap:5px}
.fbtn{font-size:12px;padding:4px 10px;border-radius:12px;border:1px solid #ddd;background:#fff;color:#888;cursor:pointer}
.fbtn.on{border-color:#4f46e5;color:#4f46e5;font-weight:600}
/* 종목 행 */
.slist{padding:0 16px}
.srow{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #f5f5f5;cursor:pointer;min-width:0}
.srow:last-child{border:none}
.sico{width:44px;height:44px;min-width:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:#fff}
.snm-wrap{flex:1;min-width:0;overflow:hidden}
.snm{font-size:14px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ssub{font-size:12px;color:#888;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sright{text-align:right;flex-shrink:0;min-width:90px}
.sval{font-size:14px;font-weight:700}
.spnl{font-size:12px;font-weight:500}
.sbadge{font-size:10px;padding:1px 5px;border-radius:5px;margin-left:4px;font-weight:600;vertical-align:middle}
.empty{text-align:center;padding:50px 16px;color:#aaa}
.add-wrap{padding:12px 16px}
.add-btn{width:100%;padding:13px;border-radius:12px;border:1.5px dashed #c7d2fe;background:#eef2ff;color:#4f46e5;font-size:14px;font-weight:600;cursor:pointer}
/* 상세 페이지 */
.detail{display:none;background:#f2f2f7;min-height:100vh}
.d-hdr{background:#fff;padding:13px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #f0f0f0;position:sticky;top:0;z-index:10}
.d-back{background:none;border:none;font-size:22px;color:#4f46e5;cursor:pointer;padding:2px 6px 2px 0;line-height:1}
.d-title{font-size:16px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.d-body{padding:14px}
.dcard{background:#fff;border-radius:14px;padding:16px;margin-bottom:12px}
.dcard-ttl{font-size:11px;color:#888;font-weight:600;letter-spacing:.3px;text-transform:uppercase;margin-bottom:10px}
.drow{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f5f5f5}
.drow:last-child{border:none}
.dl{font-size:13px;color:#888}
.dv{font-size:13px;font-weight:600;text-align:right}
.d-bigval{font-size:26px;font-weight:700;margin-bottom:3px}
.d-bigpnl{font-size:15px;font-weight:600;margin-bottom:12px}
.act-btns{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.act-btn{flex:1;min-width:0;padding:11px 8px;border-radius:11px;font-size:13px;font-weight:600;cursor:pointer;border:none;white-space:nowrap}
.btn-green{background:#f0fdf4;color:#16a34a}
.btn-blue{background:#eef2ff;color:#4f46e5}
.btn-gray{background:#f5f5f5;color:#555}
.btn-red{background:#fef2f2;color:#dc2626}
/* 인라인 폼 */
.iform{background:#f9f9ff;border-radius:11px;padding:14px;margin-bottom:12px}
.iform-ttl{font-size:13px;font-weight:700;color:#4f46e5;margin-bottom:10px}
.irow{display:flex;gap:8px;margin-bottom:8px}
.ifg{flex:1;min-width:0}
.ifl{font-size:11px;color:#888;margin-bottom:4px}
.iinp{width:100%;padding:9px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;color:#1c1c1e;background:#fff}
.iinp:focus{border-color:#4f46e5}
.isel{width:100%;padding:9px 10px;border:1.5px solid #e0e0e0;border-radius:8px;font-size:14px;outline:none;color:#1c1c1e;background:#fff}
.iprev{font-size:12px;color:#4f46e5;min-height:16px;margin-bottom:6px}
.iconfirm{width:100%;padding:11px;border-radius:9px;border:none;background:#4f46e5;color:#fff;font-size:14px;font-weight:600;cursor:pointer;margin-top:4px}
/* 배당 내역 */
.divrow{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f5f5f5;font-size:13px}
.divrow:last-child{border:none}
.tax-toggle{display:flex;border-radius:8px;overflow:hidden;border:1px solid #e0e0e0}
.tax-btn{padding:5px 12px;border:none;font-size:12px;font-weight:600;cursor:pointer;background:#fff;color:#888}
.tax-btn.on{background:#4f46e5;color:#fff}
/* 시뮬 */
.sim-wrap{padding:14px}
.sim-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.sim-card{background:#fff;border-radius:13px;padding:13px 14px;border:1px solid #f0f0f0}
.sim-lbl{font-size:11px;color:#aaa;margin-bottom:4px}
.sim-val{font-size:17px;font-weight:700}
.sim-bar-bg{background:#f0f0f0;border-radius:4px;height:5px;margin-top:5px}
.sim-bar{height:5px;border-radius:4px}
.mbars{display:flex;align-items:flex-end;gap:3px;height:70px;margin-bottom:6px}
.mcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px}
.mbar{width:100%;border-radius:2px 2px 0 0}
.mlbl{font-size:8px;color:#aaa}
.mpills{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:6px}
.mpill{font-size:11px;padding:3px 8px;border-radius:6px}
/* 파이차트 */
.chart-wrap{padding:14px}
.ccard{background:#fff;border-radius:14px;padding:16px;margin-bottom:10px}
.cttl{font-size:12px;color:#888;font-weight:600;margin-bottom:10px}
.lrow{display:flex;align-items:center;gap:10px;margin-bottom:9px}
.ldot{width:9px;height:9px;border-radius:2px;flex-shrink:0}
.lnm{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.lpc{font-weight:600;font-size:13px;min-width:38px;text-align:right}
.lvl{font-size:12px;color:#888;min-width:60px;text-align:right}
/* 모달 */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:100;display:none;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:22px 18px 44px;width:100%;max-width:480px;max-height:93vh;overflow-y:auto}
.m-ttl{font-weight:700;font-size:17px;margin-bottom:14px}
/* 계좌 선택 버튼 */
.acct-btns{display:flex;gap:8px;margin-bottom:5px}
.acct-btn{flex:1;padding:12px 4px;border-radius:10px;border:2px solid #e0e0e0;background:#fff;color:#888;font-size:14px;font-weight:600;cursor:pointer;transition:.15s}
.acct-hint{font-size:11px;text-align:center;margin-bottom:14px;min-height:15px}
/* 검색 */
.srch-box{position:relative;margin-bottom:11px}
.srch-lbl{font-size:12px;color:#888;margin-bottom:4px}
.srch-inp{width:100%;padding:11px 12px;border:1.5px solid #e0e0e0;border-radius:9px;font-size:14px;outline:none;color:#1c1c1e}
.srch-inp:focus{border-color:#4f46e5}
.srch-dd{position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e0e0e0;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:200;max-height:220px;overflow-y:auto;margin-top:3px;display:none}
.srch-dd.show{display:block}
.dd-item{padding:10px 14px;cursor:pointer;border-bottom:1px solid #f5f5f5}
.dd-item:last-child{border:none}
.dd-item:hover,.dd-item:active{background:#f9f9f9}
.dd-nm{font-size:13px;font-weight:600}
.dd-sub{font-size:11px;color:#aaa;margin-top:2px}
/* 폼 행 */
.form-row{display:flex;gap:9px;margin-bottom:11px}
.form-row .fg{flex:1;min-width:0}
.fg{margin-bottom:11px}
.fl{font-size:12px;color:#888;margin-bottom:4px}
.finp{width:100%;padding:11px 10px;border:1.5px solid #e0e0e0;border-radius:9px;font-size:14px;outline:none;color:#1c1c1e;background:#fff}
.finp:focus{border-color:#4f46e5}
.finp-wrap{display:flex;align-items:center;border:1.5px solid #e0e0e0;border-radius:9px;background:#fff}
.finp-wrap:focus-within{border-color:#4f46e5}
.finp-wrap input{flex:1;padding:11px 10px;border:none;background:transparent;font-size:14px;outline:none;min-width:0;color:#1c1c1e}
.finp-wrap .suf{padding-right:10px;font-size:12px;color:#aaa;white-space:nowrap}
.hint{background:#eef2ff;border-radius:9px;padding:9px 12px;font-size:12px;color:#4f46e5;margin-bottom:14px;line-height:1.5}
.mbtns{display:flex;gap:9px}
.bcn{flex:1;padding:13px;border-radius:10px;border:1px solid #e0e0e0;background:#f5f5f5;font-size:14px;cursor:pointer;color:#333}
.bsb{flex:2;padding:13px;border-radius:10px;border:none;background:#4f46e5;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
/* 로딩 */
#gld{position:fixed;inset:0;background:rgba(255,255,255,.92);z-index:999;display:none;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.gs{width:36px;height:36px;border-radius:50%;border:3px solid #c7d2fe;border-top-color:#4f46e5;animation:spin .75s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.spin-sm{display:inline-block;width:10px;height:10px;border:2px solid #c7d2fe;border-top-color:#4f46e5;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle}
</style>
</head>
<body>

<div id="gld">
  <div class="gs"></div>
  <div id="g-msg" style="font-size:13px;color:#4f46e5;font-weight:500;text-align:center;max-width:240px;line-height:1.5"></div>
  <button onclick="forceClose()" style="padding:8px 20px;border-radius:8px;border:1px solid #c7d2fe;background:#fff;color:#4f46e5;font-size:13px;cursor:pointer;margin-top:4px">✕ 닫기</button>
</div>

<!-- 메인 -->
<div id="main-page">
  <div class="hdr">
    <div class="hdr-row">
      <div class="hdr-lbl">총 자산</div>
      <div class="hdr-icons">
        <button class="hdr-ic" id="rf-btn" onclick="refreshAll()" title="전체 업데이트">↻</button>
        <button class="hdr-ic" onclick="openAddModal()">＋</button>
      </div>
    </div>
    <div class="hdr-total" id="h-total">0원</div>
    <div class="hdr-pnl" id="h-pnl"></div>
    <div class="hdr-info" id="h-info"></div>
    <div class="hdr-divamt" id="h-div"></div>
    <div class="icon-tabs">
      <button class="itab on" id="tab-list" onclick="goTab('list')"><span class="itab-ico">📊</span><span class="itab-lbl">보유</span></button>
      <button class="itab" id="tab-sim" onclick="goTab('sim')"><span class="itab-ico">🪙</span><span class="itab-lbl">배당</span></button>
      <button class="itab" id="tab-chart" onclick="goTab('chart')"><span class="itab-ico">📈</span><span class="itab-lbl">비중</span></button>
    </div>
  </div>
  <div class="upd-bar" id="upd-bar"></div>

  <div id="p-list">
    <div class="sec">
      <div class="sort-bar">
        <button class="stab on" id="s-val" onclick="setSort('val')">평가액순</button>
        <div class="sdiv"></div>
        <button class="stab" id="s-pnl" onclick="setSort('pnl')">수익순</button>
        <div class="fbtns">
          <div class="fbtn on" id="f-all" onclick="setFlt('all')">전체</div>
          <div class="fbtn" id="f-div" onclick="setFlt('div')">배당주</div>
          <div class="fbtn" id="f-norm" onclick="setFlt('norm')">일반</div>
        </div>
      </div>
      <div class="slist" id="s-list"></div>
      <div class="empty" id="s-empty" style="display:none">
        <div style="font-size:40px;margin-bottom:10px">📊</div>
        <div style="font-size:14px;color:#555;margin-bottom:5px">＋ 버튼으로 종목을 추가하세요</div>
        <div style="font-size:12px;color:#d97706">Yahoo Finance · Finnhub 실시간 가격</div>
      </div>
      <div class="add-wrap"><button class="add-btn" onclick="openAddModal()">＋ 종목 추가</button></div>
    </div>
  </div>

  <div id="p-sim" style="display:none"><div class="sim-wrap" id="sim-cont"></div></div>
  <div id="p-chart" style="display:none">
    <div class="chart-wrap">
      <div class="ccard"><div class="cttl">포트폴리오 비중</div><div style="position:relative;height:240px"><canvas id="pie-c"></canvas></div></div>
      <div class="ccard" id="leg-card"></div>
    </div>
  </div>
</div>

<!-- 상세 페이지 -->
<div class="detail" id="detail-page">
  <div class="d-hdr">
    <button class="d-back" onclick="goBack()">←</button>
    <div class="d-title" id="d-title"></div>
  </div>
  <div class="d-body" id="d-body"></div>
</div>

<!-- 추가 모달 -->
<div class="ov" id="add-ov">
<div class="modal" onclick="event.stopPropagation()">
  <div class="m-ttl">종목 추가</div>
  <div class="acct-btns">
    <button id="ab-norm" class="acct-btn" onclick="setAcct('normal')">일반계좌</button>
    <button id="ab-isa"  class="acct-btn" onclick="setAcct('isa')">ISA</button>
    <button id="ab-irp"  class="acct-btn" onclick="setAcct('irp')">IRP</button>
  </div>
  <div class="acct-hint" id="acct-hint"></div>
  <div class="srch-box">
    <div class="srch-lbl">종목명</div>
    <input id="srch-inp" class="srch-inp" placeholder="삼성전자, JEPQ, KODEX…" autocomplete="off">
    <div class="srch-dd" id="srch-dd"></div>
  </div>
  <div class="form-row">
    <div class="fg"><div class="fl">평균 매수가 *</div><div class="finp-wrap"><input id="f-avg" type="number" inputmode="numeric" placeholder="50000"><span class="suf">원</span></div></div>
    <div class="fg"><div class="fl">수량 *</div><div class="finp-wrap"><input id="f-qty" type="number" inputmode="numeric" placeholder="100"><span class="suf">주</span></div></div>
  </div>
  <div class="fg"><div class="fl">매수 날짜</div><input id="f-date" type="date" class="finp" style="color:#1c1c1e"></div>
  <div class="hint">추가 즉시 실시간 가격을 자동 조회합니다.<br>배당수익률은 추가 후 상세페이지에서 설정할 수 있어요.</div>
  <div class="mbtns">
    <button class="bcn" onclick="closeAddModal()">취소</button>
    <button class="bsb" onclick="submitAdd()">추가하기</button>
  </div>
</div>
</div>

function fmt(n){n=Math.round(n||0);const a=Math.abs(n),s=n<0?'-':'';if(a>=100000000)return s+(a/100000000).toFixed(1)+'억원';if(a>=10000)return s+Math.round(a/10000)+'만원';return n.toLocaleString()+'원'}
function fN(n){return Math.round(n||0).toLocaleString()}
function dvN(df){return df==='월배당'?12:df==='분기배당'?4:df==='반기배당'?2:1}
function isKR(s){return s&&(s.endsWith('.KS')||s.endsWith('.KQ'))}
function toSym(n){const d=DB.find(x=>x.n===n);return d?d.s:(n.match(/^\d{6}$/)?n+'.KS':n.toUpperCase())}
function abbr(n){const r=n.replace(/\s+/g,'');return r.length<=3?r.toUpperCase():r.slice(0,2).toUpperCase()}
function ci(id){return Math.max(0,D.h.findIndex(x=>x.id===id))}
function taxR(h){return(h.acct==='isa'||h.acct==='irp')?0:0.154}
function korNow(){const d=new Date(Date.now()+9*3600*1000);return d.toISOString().split('T')[0]}

/* ════════════ API ════════════ */
const PX=[
  u=>'https://corsproxy.io/?'+encodeURIComponent(u),
  u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
  u=>'https://api.codetabs.com/v1/proxy?quest='+encodeURIComponent(u),
  u=>'https://thingproxy.freeboard.io/fetch/'+u,
];
function tout(p,ms=7000){return Promise.race([p,new Promise((_,r)=>setTimeout(()=>r('to'),ms))])}
function parseY(txt){
  try{
    const s=txt.includes('"contents"')?JSON.parse(txt).contents:txt;
    const j=JSON.parse(s);
    const p=j?.chart?.result?.[0]?.meta?.regularMarketPrice||j?.quoteResponse?.result?.[0]?.regularMarketPrice;
    if(p&&p>0)return p;
  }catch{}return null;
}
async function naverPrice(code){
  const urls=[
    `https://m.stock.naver.com/api/stock/${code}/basic`,
    `https://polling.finance.naver.com/api/realtime/domestic/stock/${code}`,
  ];
  return tout(Promise.any(urls.flatMap(u=>PX.map(px=>
    fetch(px(u)).then(r=>{if(!r.ok)throw 0;return r.text()}).then(t=>{
      const s=t.includes('"contents"')?JSON.parse(t).contents:t;
      const j=JSON.parse(s);
      const p=j?.closePrice||j?.currentPrice||j?.stockInfo?.closePrice||(j?.result?.siseArray||[])[0]?.closePrice;
      if(!p)throw 0;
      const n=parseFloat(String(p).replace(/,/g,''));
      if(n>0)return n;throw 0;
    })
  ))));
}
async function yahooPrice(sym){
  const urls=[
    `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`,
    `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`,
    `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(sym)}`,
    `https://query2.finance.yahoo.com/v7/finance/quote?symbols=${encodeURIComponent(sym)}`,
  ];
  return tout(Promise.any(urls.flatMap(u=>PX.map(px=>
    fetch(px(u)).then(r=>{if(!r.ok)throw 0;return r.text()}).then(t=>{
      const p=parseY(t);if(!p)throw 0;return p;
    })
  ))));
}
async function fhPrice(sym){
  const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${FKEY}`);
  if(!r.ok)throw 0;const j=await r.json();if(!j.c||j.c<=0)throw 0;return j.c;
}
async function getRate(){
  try{const r=await tout(fetch('https://api.frankfurter.app/latest?from=USD&to=KRW'),4000);const j=await r.json();if(j?.rates?.KRW>100)D.rate=Math.round(j.rates.KRW);}catch{}
}
async function getPrice(sym){
  if(isKR(sym)){
    const code=sym.replace(/\.K[SQ]$/,'');
    try{return Math.round(await naverPrice(code));}catch{}
    try{return Math.round(await yahooPrice(sym));}catch{}
    throw new Error('price fail');
  }else{
    try{return Math.round((await tout(fhPrice(sym),5000))*D.rate);}catch{}
    try{return Math.round((await yahooPrice(sym))*D.rate);}catch{}
    throw new Error('price fail');
  }
}
async function getDivs(sym){
  const now=Math.floor(Date.now()/1000),p1=now-400*24*3600;
  const csvUrls=[
    `https://query1.finance.yahoo.com/v7/finance/download/${encodeURIComponent(sym)}?period1=${p1}&period2=${now}&interval=1d&events=div`,
    `https://query2.finance.yahoo.com/v7/finance/download/${encodeURIComponent(sym)}?period1=${p1}&period2=${now}&interval=1d&events=div`,
  ];
  try{
    const txt=await tout(Promise.any(csvUrls.flatMap(u=>PX.map(px=>
      fetch(px(u)).then(r=>{if(!r.ok)throw 0;return r.text()}).then(t=>{if(!t.includes(','))throw 0;return t;})
    ))),8000);
    const rows=txt.trim().split('\n').slice(1).filter(l=>l.includes(',')).map(l=>{
      const[d,a]=l.split(',');return{date:d.trim(),amount:parseFloat(a)||0};
    }).filter(x=>x.amount>0).sort((a,b)=>b.date.localeCompare(a.date));
    if(rows.length)return rows;
  }catch{}
  const chartUrls=[
    `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2y&events=div`,
    `https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=2y&events=div`,
  ];
  try{
    const txt=await tout(Promise.any(chartUrls.flatMap(u=>PX.map(px=>
      fetch(px(u)).then(r=>{if(!r.ok)throw 0;return r.text()})
    ))),8000);
    const s=txt.includes('"contents"')?JSON.parse(txt).contents:txt;
    const ev=JSON.parse(s)?.chart?.result?.[0]?.events?.dividends;
    if(ev){
      return Object.values(ev).filter(d=>d.date>p1)
        .map(d=>({date:new Date(d.date*1000).toISOString().split('T')[0],amount:parseFloat((d.amount||0).toFixed(4))}))
        .sort((a,b)=>b.date.localeCompare(a.date));
    }
  }catch{}
  return[];
}

async function fetchPrice(id){
  const h=D.h.find(x=>x.id===id);if(!h)return;
  LOADING.add(id);render();
  try{
    const p=await getPrice(h.sym||toSym(h.n));
    D.h=D.h.map(x=>x.id===id?{...x,cur:p,err:0}:x);
    D.at=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
    saveD();
  }catch{D.h=D.h.map(x=>x.id===id?{...x,err:1}:x);}
  LOADING.delete(id);render();
}
async function fetchDivs(id){
  const h=D.h.find(x=>x.id===id);if(!h)return;
  if(h.divAt&&h.divHistory?.length&&(Date.now()-h.divAt)<86400000)return;
  LOADING.add(id);render();
  try{
    const rows=await getDivs(h.sym||toSym(h.n));
    D.h=D.h.map(x=>x.id===id?{...x,divHistory:rows,divAt:Date.now()}:x);
    saveD();
  }catch{D.h=D.h.map(x=>x.id===id?{...x,divHistory:[]}:x);}
  LOADING.delete(id);render();
}
async function refreshAll(){
  if(BUSY||!D.h.length)return;
  BUSY=true;setBusy(true);showG('환율 조회 중...');
  await getRate();
  for(let i=0;i<D.h.length;i++){
    const h=D.h[i];setGMsg(`[${i+1}/${D.h.length}] ${h.n} 조회 중...`);
    LOADING.add(h.id);
    try{const p=await getPrice(h.sym||toSym(h.n));D.h=D.h.map(x=>x.id===h.id?{...x,cur:p,err:0}:x);}
    catch{D.h=D.h.map(x=>x.id===h.id?{...x,err:1}:x);}
    LOADING.delete(h.id);
  }
  D.at=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});
  saveD();hideG();setBusy(false);BUSY=false;render();
}

function renderHeader(){
  const H=D.h;
  const tv=H.reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);
  const tc=H.reduce((s,h)=>h.avgCost*h.qty+s,0);
  const pnl=tv-tc,pct=tc>0?pnl/tc*100:0;
  const dv=H.filter(h=>h.isDv&&h.dy>0);
  const md=dv.reduce((s,h)=>{const a=(h.cur||h.avg)*h.qty*h.dy/100;return s+a/dvN(h.df);},0);
  const nv=H.filter(h=>!h.isDv||!h.dy).reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);
  const dval=dv.reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);
  document.getElementById('h-total').textContent=fmt(tv);
  const pe=document.getElementById('h-pnl');
  pe.textContent=H.length?`${pnl>=0?'+':''}${fmt(pnl)} (${pct>=0?'+':''}${pct.toFixed(2)}%) 총 수익`:'';
  pe.className='hdr-pnl '+(pnl>=0?'pos':'neg');
  document.getElementById('h-info').textContent=H.length?`일반 ${fmt(nv)} · 배당주 ${fmt(dval)}`:'';
  const de=document.getElementById('h-div');
  if(md>0){de.style.display='block';de.textContent=`🪙 월 예상 배당 ${fmt(md)}`;}else de.style.display='none';
  const ub=document.getElementById('upd-bar');
  if(D.at){ub.style.display='block';ub.textContent=`업데이트 ${D.at} · USD/KRW ${fN(D.rate)}원`;}else ub.style.display='none';

function renderList(){

  const editSec=SHOW_EDIT?`<div class="iform">
  <div class="iform-ttl">배당 정보 수정</div>
  <div class="irow">
    <div class="ifg"><div class="ifl">연 배당수익률</div><input id="edy" class="iinp" type="number" inputmode="decimal" value="${h.dy||0}"><span style="font-size:12px;color:#888">%</span></div>
    <div class="ifg"><div class="ifl">배당 주기</div>
      <select id="edf" class="isel">
        ${['없음','월배당','분기배당','반기배당','연배당'].map(v=>`<option ${h.df===v?'selected':''}>${v}</option>`).join('')}
      </select>
    </div>
  </div>
  <div class="ifg"><div class="ifl">계좌 유형</div>
    <select id="eac" class="isel">
      <option value="normal" ${(h.acct||'normal')==='normal'?'selected':''}>일반계좌</option>
      <option value="isa" ${h.acct==='isa'?'selected':''}>ISA (절세)</option>
      <option value="irp" ${h.acct==='irp'?'selected':''}>IRP (절세)</option>
    </select>
  </div>
  <button class="iconfirm" onclick="saveEdit(${id})">저장</button>
</div>`:'';

  /* 배당 내역 섹션 */
  let divSec='';
  if(h.isDv){
    const isLdDiv=LOADING.has(id);
    if(isLdDiv&&!h.divHistory){
      divSec=`<div class="dcard"><div class="dcard-ttl">직전 12개월 배당</div><div style="text-align:center;padding:16px;color:#aaa"><span class="spin-sm"></span> 조회 중...</div></div>`;
    }else if(!h.divHistory){
      divSec=`<div class="dcard"><div class="dcard-ttl">직전 12개월 배당</div><div style="text-align:center;padding:12px"><button onclick="fetchDivs(${id})" style="padding:9px 20px;border-radius:9px;border:1px solid #fde68a;background:#fffbeb;color:#92400e;font-size:13px;cursor:pointer">배당 내역 조회</button></div></div>`;
    }else if(!h.divHistory.length){
      divSec=`<div class="dcard"><div class="dcard-ttl">직전 12개월 배당</div><div style="color:#aaa;font-size:13px;text-align:center;padding:10px">조회된 내역 없음</div></div>`;
    }else{
      const tr=taxR(h);
      const tot=h.divHistory.reduce((s,d)=>s+(d.amount||0),0);
      const kr=isKR(h.sym||'');
      const totKRW=kr?Math.round(tot):Math.round(tot*D.rate);
      const totDisp=TAX==='post'?Math.round(totKRW*(1-tr)):totKRW;
      divSec=`<div class="dcard">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
    <div class="dcard-ttl" style="margin-bottom:0">직전 12개월 배당</div>
    <div class="tax-toggle">
      <button class="tax-btn ${TAX==='pre'?'on':''}" onclick="TAX='pre';renderDetail(${id})">세전</button>
      <button class="tax-btn ${TAX==='post'?'on':''}" onclick="TAX='post';renderDetail(${id})">세후${tr===0?' (절세)':' -15.4%'}</button>
    </div>
  </div>
  <div style="background:${BG[idx%BG.length]};border-radius:9px;padding:10px 12px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;margin-bottom:3px">
      <span style="font-size:12px;color:#888">주당 합계</span>
      <span style="font-size:14px;font-weight:700;color:${C[idx%C.length]}">${kr?fN(TAX==='post'?Math.round(tot*(1-tr)):Math.round(tot))+'원':'$'+(TAX==='post'?(tot*(1-tr)).toFixed(4):tot.toFixed(4))}</span>
    </div>
    <div style="display:flex;justify-content:space-between">
      <span style="font-size:12px;color:#888">총 수령액 (${fN(h.qty)}주)</span>
      <span style="font-size:14px;font-weight:700;color:${C[idx%C.length]}">${fmt(totDisp*h.qty)}</span>
    </div>
  </div>
  ${h.divHistory.slice(0,12).map(d=>{
    const amtKRW=kr?Math.round(d.amount||0):Math.round((d.amount||0)*D.rate);
    const disp=TAX==='post'?Math.round(amtKRW*(1-tr)):amtKRW;
    return `<div class="divrow"><span style="color:#888">${d.date}</span><span style="font-weight:600;color:#d97706">${kr?fN(disp)+'원':'$'+(TAX==='post'?((d.amount||0)*(1-tr)).toFixed(4):(d.amount||0).toFixed(4))} <span style="color:#aaa;font-weight:400">· ${fmt(disp*h.qty)}</span></span></div>`;
  }).join('')}
</div>`;
    }
  }

  document.getElementById('d-body').innerHTML=`
<div style="display:flex;align-items:center;gap:14px;background:#fff;border-radius:14px;padding:16px;margin-bottom:12px;overflow:hidden">
  <div class="sico" style="background:${C[idx%C.length]};width:50px;height:50px;min-width:50px;font-size:15px">${abbr(h.n)}</div>
  <div style="min-width:0;flex:1;overflow:hidden">
    <div style="font-size:17px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${h.n}</div>
    <div style="font-size:12px;color:#888;margin-top:2px">${h.sym||toSym(h.n)} · ${acl}</div>
    ${h.buyDate?`<div style="font-size:12px;color:#aaa">최초 매수 ${h.buyDate}</div>`:''}
  </div>
</div>
<div class="dcard">
  <div class="d-bigval">${fmt(val)}</div>
  <div class="d-bigpnl ${pp>=0?'pos':'neg'}">${pp>=0?'+':''}${fmt(pp)} (${pp2>=0?'+':''}${pp2.toFixed(2)}%)</div>
  <div class="drow"><span class="dl">현재가</span><span class="dv">${isLd?'조회 중...':fN(cur)+'원'+usd}</span></div>
  <div class="drow"><span class="dl">평균 매수가</span><span class="dv">${fN(h.avgCost)}원</span></div>
  <div class="drow"><span class="dl">보유 수량</span><span class="dv">${fN(h.qty)}주</span></div>
  <div class="drow"><span class="dl">매수 원금</span><span class="dv">${fmt(h.avgCost*h.qty)}</span></div>
  ${h.isDv&&h.dy>0?`
  <div class="drow"><span class="dl">연 배당수익률</span><span class="dv" style="color:#d97706">${h.dy.toFixed(1)}% (${h.df})</span></div>
  <div class="drow"><span class="dl">세전 월 예상배당</span><span class="dv" style="color:#d97706">${fmt(ann/12)}</span></div>
  ${(h.acct||'normal')==='normal'?`<div class="drow"><span class="dl">세후 월 예상배당</span><span class="dv" style="color:#16a34a">${fmt(ann/12*0.846)}</span></div>`:'<div class="drow"><span class="dl">세후 월 예상배당</span><span class="dv" style="color:#16a34a">'+fmt(ann/12)+' (절세)</div>'}
  `:''}
</div>
<div class="act-btns">
  <button class="act-btn btn-green" onclick="fetchPrice(${id})">${isLd?'<span class="spin-sm"></span>':'↻'} 업데이트</button>
  <button class="act-btn btn-blue" onclick="SHOW_BUY=!SHOW_BUY;SHOW_EDIT=false;renderDetail(${id})">${SHOW_BUY?'취소':'＋ 추가매수'}</button>
  <button class="act-btn btn-gray" onclick="SHOW_EDIT=!SHOW_EDIT;SHOW_BUY=false;renderDetail(${id})">${SHOW_EDIT?'취소':'✏️ 수정'}</button>
  <button class="act-btn btn-red" onclick="delH(${id})">삭제</button>
</div>
${buySec}${editSec}${divSec}`;
}
function updPrev(id){
  const h=D.h.find(x=>x.id===id);if(!h)return;
  const q=parseInt(document.getElementById('bq')?.value)||0;
  const a=parseFloat(document.getElementById('ba')?.value)||0;
  const p=document.getElementById('buy-prev');
  if(p&&q>0&&a>0){const nq=h.qty+q,na=Math.round((h.avgCost*h.qty+a*q)/nq);p.textContent=`매수 후 → ${fN(nq)}주 · 평균단가 ${fN(na)}원`;}
  else if(p)p.textContent='';
}
function confirmBuy(id){
  const q=parseInt(document.getElementById('bq')?.value)||0;
  const a=parseFloat(document.getElementById('ba')?.value)||0;
  const dt=document.getElementById('bd')?.value||'';
  const ac=document.getElementById('bac')?.value||'normal';
  if(!q||!a){alert('수량과 단가를 입력해주세요');return;}
  D.h=D.h.map(h=>{if(h.id!==id)return h;const nq=h.qty+q,na=Math.round((h.avgCost*h.qty+a*q)/nq);return{...h,qty:nq,avgCost:na,avg:na,acct:ac};});
  saveD();SHOW_BUY=false;renderDetail(id);render();
}
function saveEdit(id){
  const dy=parseFloat(document.getElementById('edy')?.value)||0;
  const df=document.getElementById('edf')?.value||'없음';
  const ac=document.getElementById('eac')?.value||'normal';
  D.h=D.h.map(x=>x.id===id?{...x,dy,df,isDv:dy>0,acct:ac}:x);
  saveD();SHOW_EDIT=false;renderDetail(id);render();
}
function delH(id){
  const h=D.h.find(x=>x.id===id);
  if(!h||!confirm(h.n+' 삭제할까요?'))return;
  D.h=D.h.filter(x=>x.id!==id);saveD();goBack();
}

/* ════════════ 시뮬 ════════════ */
function renderSim(){
  const H=D.h,tv=H.reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);
  const dv=H.filter(h=>h.isDv&&h.dy>0);
  const sc=document.getElementById('sim-cont');
  if(!dv.length){sc.innerHTML='<div class="empty"><div style="font-size:36px;margin-bottom:10px">🪙</div><div>배당주를 추가하면 시뮬레이션이 표시됩니다</div></div>';return;}
  const ss=dv.map((h,i)=>{const val=(h.cur||h.avg)*h.qty,ann=val*h.dy/100;return{...h,val,ann,mon:ann/12,pp:ann/dvN(h.df),i};});
  const tM=ss.reduce((s,x)=>s+x.mon,0),tA=ss.reduce((s,x)=>s+x.ann,0),tD=ss.reduce((s,x)=>s+x.val,0);
  const aY=tD>0?tA/tD*100:0,mxM=Math.max(...ss.map(x=>x.mon),1);
  const md=Array(12).fill(0).map(()=>0);
  ss.forEach(x=>{const a=m=>{md[m]+=x.pp};if(x.df==='월배당'){for(let m=0;m<12;m++)md[m]+=x.mon;}else if(x.df==='분기배당')[2,5,8,11].forEach(a);else if(x.df==='반기배당')[5,11].forEach(a);else if(x.df==='연배당')a(11);});
  const mxB=Math.max(...md,1);
  const ci2=h=>Math.max(0,D.h.findIndex(x=>x.id===h.id));
  sc.innerHTML=`
<div class="sim-grid">${[['월 예상 배당',fmt(tM),'#d97706'],['연 예상 배당',fmt(tA),'#4f46e5'],['평균 배당수익률',aY.toFixed(2)+'%','#16a34a'],['배당주 평가금액',fmt(tD),'#0891b2']].map(([l,v,c])=>`<div class="sim-card"><div class="sim-lbl">${l}</div><div class="sim-val" style="color:${c}">${v}</div></div>`).join('')}</div>
<div class="ccard"><div class="cttl">종목별 월 배당</div>${ss.map(x=>`<div style="margin-bottom:11px"><div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:4px"><div style="min-width:0;flex:1;overflow:hidden"><span style="font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block">${x.n}</span><span style="font-size:10px;background:${BG[ci2(x)%BG.length]};color:${C[ci2(x)%C.length]};padding:1px 5px;border-radius:5px">${x.df}</span></div><div style="text-align:right;flex-shrink:0;margin-left:8px"><div style="font-size:13px;font-weight:700;color:#d97706">${fmt(x.mon)}/월</div><div style="font-size:11px;color:#aaa">연 ${fmt(x.ann)}</div></div></div><div class="sim-bar-bg"><div class="sim-bar" style="width:${x.mon/mxM*100}%;background:${C[ci2(x)%C.length]}"></div></div></div>`).join('')}</div>
<div class="ccard"><div class="cttl">월별 배당 입금 예상</div><div class="mbars">${md.map((v,i)=>`<div class="mcol"><div class="mbar" style="height:${v>0?Math.max(v/mxB*60,5):3}px;background:${v>0?'#4f46e5':'#e8e8e8'}"></div><div class="mlbl">${i+1}</div></div>`).join('')}</div><div class="mpills">${md.map((v,i)=>`<span class="mpill" style="background:${v>0?'#eef2ff':'#f5f5f5'};color:${v>0?'#4f46e5':'#bbb'}">${i+1}월 ${v>0?fmt(v):'—'}</span>`).join('')}</div><div style="font-size:10px;color:#aaa;padding-top:8px;border-top:1px solid #f0f0f0;margin-top:4px">※ 분기배당 3·6·9·12월 / 반기배당 6·12월 기준 추정</div></div>`;
}

/* ════════════ 파이차트 ════════════ */
function renderPie(){
  const H=D.h,tv=H.reduce((s,h)=>(h.cur||h.avg)*h.qty+s,0);
  const lc=document.getElementById('leg-card');
  if(!H.length){if(PIE_CHART){PIE_CHART.destroy();PIE_CHART=null;}lc.innerHTML='';return;}
  if(PIE_CHART)PIE_CHART.destroy();
  PIE_CHART=new Chart(document.getElementById('pie-c'),{
    type:'doughnut',
    data:{labels:H.map(h=>h.n.length>8?h.n.slice(0,8)+'…':h.n),datasets:[{data:H.map(h=>Math.round((h.cur||h.avg)*h.qty)),backgroundColor:C.slice(0,H.length),borderWidth:2,borderColor:'#f2f2f7'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'58%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmt(c.raw)} (${(c.raw/tv*100).toFixed(1)}%)`}}}}
  });
  lc.innerHTML='<div class="cttl">종목 비중</div>'+H.map((h,i)=>{const v=(h.cur||h.avg)*h.qty,p=tv>0?v/tv*100:0;return`<div class="lrow"><div class="ldot" style="background:${C[i%C.length]}"></div><div class="lnm">${h.n}</div><div class="lpc">${p.toFixed(1)}%</div><div class="lvl">${fmt(v)}</div></div>`;}).join('')+`<div style="border-top:1px solid #f0f0f0;padding-top:8px;margin-top:4px;display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600">합계</span><span style="font-size:13px;font-weight:700;color:#4f46e5">${fmt(tv)}</span></div>`;
}

/* ════════════ 탭 / 필터 / 정렬 ════════════ */
function goTab(t){
  TAB=t;
  ['list','sim','chart'].forEach(k=>{
    document.getElementById('p-'+k).style.display=k===t?'':'none';
    document.getElementById('tab-'+k).className='itab'+(k===t?' on':'');
  });
  if(t==='sim')renderSim();
  else if(t==='chart')renderPie();
}
function setFlt(f){FLT=f;[['all','all'],['div','div'],['norm','norm']].forEach(([id,k])=>document.getElementById('f-'+id).className='fbtn'+(f===k?' on':''));renderList();}
function setSort(s){SORT=s;document.getElementById('s-val').className='stab'+(s==='val'?' on':'');document.getElementById('s-pnl').className='stab'+(s==='pnl'?' on':'');renderList();}

/* ════════════ 검색 드롭다운 (이벤트 위임) ════════════ */
let SRCH=[];
function doSearch(q){
  const dd=document.getElementById('srch-dd');
  if(!q||!q.trim()){dd.className='srch-dd';dd.innerHTML='';SRCH=[];return;}
  const ql=q.toLowerCase().replace(/\s+/g,'');
  SRCH=DB.filter(x=>x.n.toLowerCase().replace(/\s+/g,'').includes(ql)||x.s.toLowerCase().includes(ql)).slice(0,20);
  if(!SRCH.length){dd.className='srch-dd';dd.innerHTML='';return;}
  dd.innerHTML=SRCH.map((x,i)=>`<div class="dd-item" data-i="${i}"><div class="dd-nm">${x.n}</div><div class="dd-sub">${x.s} · ${x.isDv?'배당 '+x.dy+'% · '+x.df:'배당없음'}</div></div>`).join('');
  dd.className='srch-dd show';
}
function closeDD(){const dd=document.getElementById('srch-dd');if(dd){dd.className='srch-dd';dd.innerHTML='';}SRCH=[];}
function pickResult(x){
  document.getElementById('srch-inp').value=x.n;
  document.getElementById('f-avg').focus();
  closeDD();
}
/* 이벤트 위임 초기화 */
function initDD(){
  const dd=document.getElementById('srch-dd');
  const inp=document.getElementById('srch-inp');
  if(!dd||!inp)return;
  dd.addEventListener('mousedown',function(e){
    e.preventDefault();
    const item=e.target.closest('[data-i]');
    if(item){const x=SRCH[parseInt(item.getAttribute('data-i'))];if(x)pickResult(x);}
  });
  inp.addEventListener('input',function(){doSearch(this.value);});
  inp.addEventListener('blur',function(){setTimeout(closeDD,150);});
  document.addEventListener('click',function(e){if(!dd.contains(e.target)&&e.target!==inp)closeDD();});
}

/* ════════════ 모달 ════════════ */
function setAcct(v){
  CUR_ACCT=v;
  ['normal','isa','irp'].forEach(k=>{
    const b=document.getElementById('ab-'+k);
    const on=k===v;
    b.style.background=on?ACCT_C[k]:'#fff';
    b.style.color=on?'#fff':'#888';
    b.style.borderColor=on?ACCT_C[k]:'#e0e0e0';
  });
  const hint=document.getElementById('acct-hint');
  hint.textContent=ACCT_H[v];
  hint.style.color=ACCT_C[v];
}
function openAddModal(){
  document.getElementById('add-ov').classList.add('show');
  document.getElementById('srch-inp').value='';
  document.getElementById('f-avg').value='';
  document.getElementById('f-qty').value='';
  document.getElementById('f-date').value=korNow();
  closeDD();
  setAcct('normal');
  setTimeout(()=>document.getElementById('srch-inp').focus(),100);
}
function closeAddModal(){document.getElementById('add-ov').classList.remove('show');closeDD();}
document.getElementById('add-ov').addEventListener('click',function(e){if(e.target===this)closeAddModal();});

async function submitAdd(){
  const nm=document.getElementById('srch-inp').value.trim();
  const avg=parseFloat(document.getElementById('f-avg').value);
  const qty=parseInt(document.getElementById('f-qty').value);
  const dt=document.getElementById('f-date').value;
  if(!nm||!avg||!qty){alert('종목명, 평단가, 수량을 입력해주세요');return;}
  const dbI=DB.find(x=>x.n===nm);
  const sym=dbI?dbI.s:toSym(nm);
  const dy=dbI?dbI.dy:0,df=dbI?dbI.df:'없음';
  const id=Date.now();
  D.h.push({id,n:nm,sym,avg,avgCost:avg,qty,cur:avg,dy,df,isDv:dy>0,acct:CUR_ACCT,buyDate:dt,err:0});
  saveD();closeAddModal();render();
  if(!isKR(sym))await getRate();
  await fetchPrice(id);
}

/* ════════════ 로딩 ════════════ */
let _gt=null;
function showG(m){document.getElementById('gld').style.display='flex';setGMsg(m);if(_gt)clearTimeout(_gt);_gt=setTimeout(forceClose,30000);}
function setGMsg(m){document.getElementById('g-msg').textContent=m;}
function hideG(){document.getElementById('gld').style.display='none';if(_gt){clearTimeout(_gt);_gt=null;}}
function forceClose(){hideG();BUSY=false;setBusy(false);LOADING.clear();render();}
function setBusy(b){const btn=document.getElementById('rf-btn');if(btn)btn.style.animation=b?'spin .75s linear infinite':'none';}

/* ════════════ 백그라운드 배당 조회 ════════════ */
async function prefetchDivs(){
  for(const h of D.h.filter(x=>x.isDv&&x.dy>0)){
    if(!h.divHistory||!h.divAt||(Date.now()-h.divAt)>86400000){
      await fetchDivs(h.id);
      await new Promise(r=>setTimeout(r,400));
    }
  }
}

render();
initDD();
setTimeout(prefetchDivs,1500);
</script>
</body>
</html>
