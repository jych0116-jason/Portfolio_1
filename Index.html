<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>내 포트폴리오</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Helvetica Neue',sans-serif;background:#f5f3ee;color:#1c1917;max-width:480px;margin:0 auto;min-height:100vh}
.hdr{background:#fff;padding:20px 18px 14px;border-bottom:1px solid #e8e3d8;position:sticky;top:0;z-index:40}
.lbl{font-size:11px;color:#aaa;letter-spacing:.5px;margin-bottom:2px}
.total{font-size:30px;font-weight:700;letter-spacing:-.5px}
.pnl{font-size:13px;font-weight:500;margin-top:2px}
.pos{color:#16a34a}.neg{color:#dc2626}
.sub{font-size:11px;color:#aaa;margin-top:2px}
.mdiv{font-size:12px;color:#d97706;margin-top:2px;display:none}
.upd{font-size:10px;color:#bbb;margin-top:2px}
/* realized pnl header */
.rpnl-hdr{font-size:11px;margin-top:3px;padding:4px 8px;border-radius:6px;display:none;width:fit-content}
.rpnl-hdr.pos{background:#f0fdf4;color:#16a34a}
.rpnl-hdr.neg{background:#fef2f2;color:#dc2626}
.rfbtn{width:100%;margin-top:10px;padding:11px;border:none;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer}
.rfbtn.on{background:#2563eb;color:#fff}.rfbtn.off{background:#eff6ff;color:#2563eb}
.tabs{display:flex;background:#fff;border-bottom:1px solid #e8e3d8}
.tab{flex:1;padding:11px 0;border:none;background:none;font-size:12px;color:#888;cursor:pointer;border-bottom:2px solid transparent;font-weight:500}
.tab.on{color:#2563eb;font-weight:700;border-bottom-color:#2563eb}
.pane{padding:12px 14px 80px}
.frow{display:flex;gap:7px;margin-bottom:10px;flex-wrap:wrap}
.fp{padding:6px 14px;border-radius:20px;border:1px solid #e8e3d8;background:#fff;font-size:12px;color:#888;cursor:pointer;font-weight:500;white-space:nowrap}
.fp.on{background:#2563eb;color:#fff;border-color:#2563eb}
.sort-row{display:flex;gap:6px;margin-bottom:12px;align-items:center}
.sort-lbl{font-size:11px;color:#aaa;flex-shrink:0}
.sp{padding:5px 11px;border-radius:20px;border:1px solid #e8e3d8;background:#fff;font-size:11px;color:#888;cursor:pointer;font-weight:500}
.sp.on{background:#1c1917;color:#fff;border-color:#1c1917}
.card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #e8e3d8}
.crow{display:flex;justify-content:space-between;margin-bottom:10px}
.cnrow{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
.cdot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.cname{font-weight:700;font-size:14px}
.cbadge{font-size:10px;background:#fffbeb;color:#92400e;padding:1px 6px;border-radius:8px}
.csub{font-size:11px;color:#aaa;margin-top:3px;margin-left:17px}
.cval{font-weight:700;font-size:15px;text-align:right}
.cpnl{font-size:12px;font-weight:500;text-align:right}
.brow{display:flex;gap:7px;margin-bottom:8px;align-items:stretch}
.bdg{border-radius:8px;padding:8px 10px;font-size:12px;display:flex;align-items:center}
.bdg-g{background:#f0fdf4;color:#166534;flex:1}
.bdg-s{background:#f9f8f5;color:#888;min-width:52px;justify-content:center}
.rbtn{padding:8px 11px;border-radius:8px;border:1px solid #bfdbfe;background:#eff6ff;font-size:15px;cursor:pointer;flex-shrink:0}
.rbtn:disabled{opacity:.5;cursor:default}
.dtag{background:#fffbeb;border:1px solid #fde68a;border-radius:8px;padding:7px 11px;font-size:12px;color:#92400e;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
.etag{background:#fff7ed;border:1px solid #fed7aa;border-radius:7px;padding:5px 9px;font-size:11px;color:#c2410c;margin-bottom:7px}
.divbox{background:#f9f8f5;border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:12px}
.divrow{display:flex;justify-content:space-between;padding:4px 0;border-top:1px solid #e8e3d8}
.divrow:first-child{border-top:none}
.abtn{flex:1;padding:8px;border-radius:8px;border:1px solid #bfdbfe;background:#eff6ff;font-size:12px;color:#2563eb;cursor:pointer;font-weight:500}
.slbtn{padding:8px 12px;border-radius:8px;border:1px solid #fed7aa;background:#fff7ed;font-size:12px;color:#ea580c;cursor:pointer;font-weight:500}
.dbtn{padding:8px 12px;border-radius:8px;border:1px solid #fecaca;background:#fef2f2;font-size:12px;color:#dc2626;cursor:pointer}
.addbtn{width:100%;padding:14px;border-radius:12px;border:2px dashed #93c5fd;background:#eff6ff;color:#2563eb;font-size:14px;font-weight:600;cursor:pointer;margin-top:2px}
.empty{text-align:center;padding:50px 0;color:#bbb}
.spin{display:inline-block;width:11px;height:11px;border:2px solid #bfdbfe;border-top-color:#2563eb;border-radius:50%;animation:sp .6s linear infinite;vertical-align:middle;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}
/* 메모 */
.memo-row{margin-top:8px}
.memo-input{width:100%;border:1px solid #e8e3d8;border-radius:8px;padding:7px 10px;font-size:12px;color:#555;background:#fafafa;resize:none;outline:none;font-family:inherit}
.memo-input:focus{border-color:#2563eb;background:#fff}
.memo-disp{font-size:11px;color:#888;margin-top:6px;padding:6px 10px;background:#f9f8f5;border-radius:7px;cursor:pointer;border:1px dashed #e8e3d8;min-height:28px}
/* sim */
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.scard{background:#fff;border-radius:14px;padding:13px 14px;border:1px solid #e8e3d8}
.slbl{font-size:11px;color:#aaa;margin-bottom:4px}
.sval{font-size:18px;font-weight:700}
.sbg{background:#f3f3f1;border-radius:4px;height:7px;margin-top:5px}
.sbar{height:7px;border-radius:4px}
.mbars{display:flex;align-items:flex-end;gap:3px;height:80px;margin-bottom:8px}
.mcol{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.mbar{width:100%;border-radius:3px 3px 0 0}
.mlbl{font-size:8px;color:#aaa}
.mpills{display:flex;flex-wrap:wrap;gap:5px}
.mpill{font-size:11px;padding:3px 9px;border-radius:6px}
/* 절세계좌 탭 */
.stabs{display:flex;gap:0;background:#f9f8f5;border-radius:10px;padding:3px;margin-bottom:12px}
.stab{flex:1;padding:7px 0;border:none;background:none;font-size:12px;color:#888;cursor:pointer;border-radius:8px;font-weight:500}
.stab.on{background:#fff;color:#1c1917;font-weight:700;box-shadow:0 1px 4px rgba(0,0,0,.08)}
/* 배당 목표 */
.goal-bar-wrap{background:#f3f3f1;border-radius:6px;height:10px;margin:6px 0 2px;overflow:hidden}
.goal-bar{height:10px;border-radius:6px;transition:width .5s ease}
/* 실현손익 히스토리 */
.hist-card{background:#fff;border-radius:14px;padding:14px;margin-bottom:10px;border:1px solid #e8e3d8}
.hist-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-top:1px solid #f3f3f1;font-size:12px}
.hist-row:first-child{border-top:none}
/* chart */
.ccard{background:#fff;border-radius:14px;padding:16px;border:1px solid #e8e3d8;margin-bottom:10px}
.cttl{font-size:12px;color:#aaa;margin-bottom:10px}
.lrow{display:flex;align-items:center;gap:10px;margin-bottom:10px}
.ldot{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.lnm{flex:1;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lpc{font-weight:600;font-size:13px;min-width:40px;text-align:right}
.lvl{font-size:12px;color:#888;min-width:62px;text-align:right}
/* modals */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:100;display:none;align-items:flex-end;justify-content:center}
.ov.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;padding:22px 18px 44px;width:100%;max-width:480px;max-height:93vh;overflow-y:auto}
.mt{font-weight:700;font-size:17px;margin-bottom:16px}
.fl{font-size:12px;color:#888;margin-bottom:4px}
.fg{margin-bottom:12px}
.iw{display:flex;align-items:center;background:#f9f8f5;border:1.5px solid #e8e3d8;border-radius:9px}
.iw:focus-within{border-color:#2563eb}
.inp{flex:1;padding:11px 12px;border:none;background:transparent;font-size:14px;outline:none;min-width:0;color:#1c1917}
.suf{padding-right:10px;font-size:12px;color:#aaa;white-space:nowrap}
.fr{display:flex;gap:10px}.fr .fg{flex:1}
.hint{background:#eff6ff;border-radius:9px;padding:9px 12px;font-size:12px;color:#2563eb;margin-bottom:14px;line-height:1.5}
.warn{background:#fff7ed;border-radius:9px;padding:9px 12px;font-size:12px;color:#ea580c;margin-bottom:14px;line-height:1.5}
.mbtns{display:flex;gap:10px}
.bcn{flex:1;padding:13px;border-radius:10px;border:1px solid #e8e3d8;background:#f9f8f5;font-size:14px;cursor:pointer;color:#1c1917}
.bsb{flex:2;padding:13px;border-radius:10px;border:none;background:#2563eb;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
.bsl{flex:2;padding:13px;border-radius:10px;border:none;background:#ea580c;color:#fff;font-size:14px;font-weight:600;cursor:pointer}
#gld{display:none;position:fixed;inset:0;background:rgba(255,255,255,.9);z-index:999;flex-direction:column;align-items:center;justify-content:center;gap:12px}
#gld .gs{width:38px;height:38px;border-radius:50%;border:3px solid #bfdbfe;border-top-color:#2563eb;animation:sp .75s linear infinite}
/* 데이터 내보내기 버튼 */
.io-row{display:flex;gap:8px;margin-bottom:12px}
.io-btn{flex:1;padding:10px;border-radius:10px;border:1px solid #e8e3d8;background:#fff;font-size:12px;color:#555;cursor:pointer;font-weight:500;text-align:center}
</style>
</head>
<body>

<div id="gld">
  <div class="gs"></div>
  <div id="gmsg" style="font-size:13px;color:#2563eb;font-weight:500;text-align:center;max-width:260px;line-height:1.5"></div>
  <button onclick="forceClose()" style="padding:9px 22px;border-radius:9px;border:1px solid #bfdbfe;background:#fff;color:#2563eb;font-size:13px;cursor:pointer;margin-top:4px">✕ 닫기</button>
</div>

<div class="hdr">
  <div class="lbl">총 자산</div>
  <div class="total" id="hTotal">0원</div>
  <div class="pnl" id="hPnl"></div>
  <div class="sub" id="hSub"></div>
  <div id="hRpnl" class="rpnl-hdr"></div>
  <div class="mdiv" id="hDiv"></div>
  <div class="upd" id="hUpd"></div>
  <button class="rfbtn on" id="rfBtn" onclick="refreshAll()">🔄 전체 가격 업데이트</button>
</div>

<div class="tabs">
  <button class="tab on" id="tList" onclick="goTab('list')">보유종목</button>
  <button class="tab" id="tSim" onclick="goTab('sim')">배당 시뮬</button>
  <button class="tab" id="tChart" onclick="goTab('chart')">비중 차트</button>
  <button class="tab" id="tHist" onclick="goTab('hist')">실현손익</button>
</div>

<div class="pane" id="pList">
  <div class="io-row">
    <button class="io-btn" onclick="exportData()">📤 내보내기</button>
    <button class="io-btn" onclick="document.getElementById('importFile').click()">📥 불러오기</button>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
  <div class="frow" id="frow" style="display:none">
    <button class="fp on" id="fAll" onclick="setFlt('all')">전체</button>
    <button class="fp" id="fNorm" onclick="setFlt('normal')">일반주식</button>
    <button class="fp" id="fDiv" onclick="setFlt('div')">배당주</button>
    <button class="fp" id="fHigh" onclick="setFlt('high')">고배당</button>
  </div>
  <div class="sort-row" id="sortRow" style="display:none">
    <span class="sort-lbl">정렬</span>
    <button class="sp on" id="sDefault" onclick="setSort('default')">기본</button>
    <button class="sp" id="sVal" onclick="setSort('val')">평가액↓</button>
    <button class="sp" id="sPnl" onclick="setSort('pnl')">수익률↓</button>
    <button class="sp" id="sDy" onclick="setSort('dy')">배당률↓</button>
  </div>
  <div id="hList"></div>
  <div class="empty" id="eEmpty">
    <div style="font-size:40px;margin-bottom:10px">📊</div>
    <div style="font-size:14px;color:#555">아래 버튼으로 종목을 추가하세요</div>
    <div style="font-size:12px;color:#d97706;margin-top:6px">Finnhub 실시간 가격 자동 조회</div>
  </div>
  <button class="addbtn" onclick="openAdd()">+ 종목 추가</button>
</div>

<div class="pane" id="pSim" style="display:none">
  <!-- 배당 목표 설정 -->
  <div class="ccard" id="goalCard">
    <div class="cttl" style="display:flex;justify-content:space-between;align-items:center">
      <span>🎯 월 배당 목표</span>
      <button onclick="openGoal()" style="font-size:11px;padding:3px 10px;border-radius:6px;border:1px solid #e8e3d8;background:#f9f8f5;color:#555;cursor:pointer">설정</button>
    </div>
    <div id="goalDisp"></div>
  </div>
  <!-- 절세계좌 탭 -->
  <div class="stabs">
    <button class="stab on" id="stGeneral" onclick="setSimTab('general')">일반계좌</button>
    <button class="stab" id="stISA" onclick="setSimTab('isa')">ISA</button>
    <button class="stab" id="stIRP" onclick="setSimTab('irp')">IRP/연금저축</button>
  </div>
  <div id="simCont"></div>
</div>

<div class="pane" id="pChart" style="display:none">
  <div class="ccard"><div class="cttl">포트폴리오 비중</div><div style="position:relative;height:240px"><canvas id="pieC"></canvas></div></div>
  <div class="ccard" id="legCard"></div>
</div>

<!-- 실현손익 탭 -->
<div class="pane" id="pHist" style="display:none">
  <div id="histCont"></div>
</div>

<!-- 종목 추가 모달 -->
<div class="ov" id="addOv" onclick="if(event.target===this)this.classList.remove('show')">
<div class="modal" onclick="event.stopPropagation()">
  <div class="mt">종목 추가</div>
  <div class="fg" style="position:relative">
    <div class="fl">종목명</div>
    <div class="iw"><input class="inp" id="aName" placeholder="삼성전자, JEPQ, KODEX…" autocomplete="off" oninput="doSearchDD(this.value)" onkeydown="if(event.key==='Escape')closeDD()"></div>
    <div id="searchDD" style="display:none;position:absolute;top:100%;left:0;right:0;background:#fff;border:1px solid #e8e3d8;border-radius:10px;box-shadow:0 4px 16px rgba(0,0,0,.12);z-index:200;max-height:220px;overflow-y:auto;margin-top:3px"></div>
  </div>
  <div class="fr">
    <div class="fg"><div class="fl">평균 매수가 *</div><div class="iw"><input class="inp" id="aAvg" type="number" inputmode="numeric" placeholder="50000"><span class="suf">원</span></div></div>
    <div class="fg"><div class="fl">수량 *</div><div class="iw"><input class="inp" id="aQty" type="number" inputmode="numeric" placeholder="100"><span class="suf">주</span></div></div>
  </div>
  <div class="fr">
    <div class="fg"><div class="fl">연 배당수익률</div><div class="iw"><input class="inp" id="aDy" type="number" inputmode="decimal" placeholder="12.5"><span class="suf">%</span></div></div>
    <div class="fg"><div class="fl">배당 주기</div><div class="iw"><select class="inp" id="aDf" style="-webkit-appearance:auto;appearance:auto"><option>없음</option><option>월배당</option><option>분기배당</option><option>반기배당</option><option>연배당</option></select></div></div>
  </div>
  <div class="fg"><div class="fl">계좌 유형</div>
    <div class="iw"><select class="inp" id="aAcct" style="-webkit-appearance:auto;appearance:auto">
      <option value="general">일반계좌</option>
      <option value="isa">ISA</option>
      <option value="irp">IRP/연금저축</option>
    </select></div>
  </div>
  <div class="hint">추가 즉시 Finnhub에서 현재가를 자동 조회합니다.<br>국내외 모든 종목 입력 가능합니다.</div>
  <div class="mbtns">
    <button class="bcn" onclick="document.getElementById('addOv').classList.remove('show')">취소</button>
    <button class="bsb" onclick="addHolding()">추가하기</button>
  </div>
</div>
</div>

<!-- 추가매수 모달 -->
<div class="ov" id="buyOv" onclick="if(event.target===this)this.classList.remove('show')">
<div class="modal" onclick="event.stopPropagation()">
  <div class="mt">추가매수</div>
  <div id="buyInfo" style="font-size:13px;color:#888;margin-bottom:16px"></div>
  <div class="fr">
    <div class="fg"><div class="fl">매수 수량</div><div class="iw"><input class="inp" id="bQty" type="number" inputmode="numeric" placeholder="100"><span class="suf">주</span></div></div>
    <div class="fg"><div class="fl">매수 단가</div><div class="iw"><input class="inp" id="bAvg" type="number" inputmode="numeric" placeholder="55000"><span class="suf">원</span></div></div>
  </div>
  <div id="buyPrev" style="background:#eff6ff;border-radius:9px;padding:9px 12px;font-size:12px;color:#2563eb;margin-bottom:14px;display:none"></div>
  <div class="mbtns">
    <button class="bcn" onclick="document.getElementById('buyOv').classList.remove('show')">취소</button>
    <button class="bsb" onclick="confirmBuy()">매수 반영</button>
  </div>
</div>
</div>

<!-- 매도 모달 -->
<div class="ov" id="sellOv" onclick="if(event.target===this)this.classList.remove('show')">
<div class="modal" onclick="event.stopPropagation()">
  <div class="mt">매도</div>
  <div id="sellInfo" style="font-size:13px;color:#888;margin-bottom:16px"></div>
  <div class="fr">
    <div class="fg"><div class="fl">매도 수량</div><div class="iw"><input class="inp" id="sQty" type="number" inputmode="numeric" placeholder="50"><span class="suf">주</span></div></div>
    <div class="fg"><div class="fl">매도 단가</div><div class="iw"><input class="inp" id="sAvg" type="number" inputmode="numeric" placeholder="60000"><span class="suf">원</span></div></div>
  </div>
  <div id="sellPrev" style="border-radius:9px;padding:9px 12px;font-size:12px;margin-bottom:14px;display:none"></div>
  <div class="mbtns">
    <button class="bcn" onclick="document.getElementById('sellOv').classList.remove('show')">취소</button>
    <button class="bsl" onclick="confirmSell()">매도 확정</button>
  </div>
</div>
</div>

<!-- 배당 목표 설정 모달 -->
<div class="ov" id="goalOv" onclick="if(event.target===this)this.classList.remove('show')">
<div class="modal" onclick="event.stopPropagation()">
  <div class="mt">월 배당 목표 설정</div>
  <div class="fg"><div class="fl">월 목표 배당금</div><div class="iw"><input class="inp" id="gGoal" type="number" inputmode="numeric" placeholder="500000"><span class="suf">원</span></div></div>
  <div class="hint">목표 금액을 설정하면 배당 시뮬 탭에서 달성률을 확인할 수 있습니다.</div>
  <div class="mbtns">
    <button class="bcn" onclick="document.getElementById('goalOv').classList.remove('show')">취소</button>
    <button class="bsb" onclick="saveGoal()">저장</button>
  </div>
</div>
</div>

<script>
const FKEY='d7cp7hhr01qv03et7mg0d7cp7hhr01qv03et7mgg';

const SEARCH_DB=[
  {n:'삼성전자',s:'005930.KS',dy:2.5,df:'분기배당',isDv:true,kr:1},
  {n:'SK하이닉스',s:'000660.KS',dy:0.8,df:'분기배당',isDv:true,kr:1},

}

function fN(n){return Math.round(n||0).toLocaleString();}

/* Yahoo / Finnhub */
const PROXIES=[
  u=>'https://corsproxy.io/?'+encodeURIComponent(u),
  u=>'https://api.allorigins.win/raw?url='+encodeURIComponent(u),
];
async function yahooQuote(sym){
  const url=`https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=1d`;
  for(const mkP of PROXIES){
    try{
      const r=await fetch(mkP(url));if(!r.ok)continue;
      const text=await r.text();
      const j=JSON.parse(text.startsWith('{"contents"')?JSON.parse(text).contents:text);
      const p=j?.chart?.result?.[0]?.meta?.regularMarketPrice;
      if(p&&p>0)return p;
    }catch{}
  }
  throw new Error('조회실패');
}
async function fhQuote(sym){
  const r=await fetch(`https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${FKEY}`);
  if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();if(!j.c||j.c<=0)throw new Error('no price');return j.c;
}
async function fetchRate(){
  try{
    const r=await fetch('https://api.frankfurter.app/latest?from=USD&to=KRW');
    const j=await r.json();const rt=j?.rates?.KRW;
    if(rt&&rt>100)D.rate=Math.round(rt);
  }catch{}
}
async function fhDivs(sym){
  const to=new Date().toISOString().split('T')[0];
  const from=new Date(Date.now()-365*24*3600*1000).toISOString().split('T')[0];
  const r=await fetch(`https://finnhub.io/api/v1/stock/dividend2?symbol=${encodeURIComponent(sym)}&from=${from}&to=${to}&token=${FKEY}`);
  if(!r.ok)throw new Error('HTTP '+r.status);
  const j=await r.json();
  return(j||[]).sort((a,b)=>(b.date||'').localeCompare(a.date||''));
}

async function fetchOne(id){
  const h=D.h.find(x=>x.id===id);if(!h)return;
  LDS.add(id);render();
  try{
    const sym=h.sym||toSym(h.n);let p;
    if(isKR(sym)){p=Math.round(await yahooQuote(sym));}
    else{p=Math.round((await fhQuote(sym))*D.rate);}
    D.h=D.h.map(x=>x.id===id?{...x,cur:p,sym,err:0}:x);
    D.at=new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit'});save();
  }catch{D.h=D.h.map(x=>x.id===id?{...x,err:1}:x);}
  LDS.delete(id);render();
}
async function fetchDivs(id){
  const h=D.h.find(x=>x.id===id);if(!h)return;
  LDS.add(id);render();
  try{
    const sym=h.sym||toSym(h.n);
    const divs=await fhDivs(sym);
    D.h=D.h.map(x=>x.id===id?{...x,divHistory:divs,divErr:0}:x);save();
  }catch{D.h=D.h.map(x=>x.id===id?{...x,divHistory:[],divErr:1}:x);}
  LDS.delete(id);render();
}

/* ===== PIE ===== */
function renderPie(H,tV){
  const lc=document.getElementById('legCard');
  if(!H.length){if(PIE){PIE.destroy();PIE=null;}lc.innerHTML='';return;}
  if(PIE)PIE.destroy();
  PIE=new Chart(document.getElementById('pieC'),{
    type:'doughnut',
    data:{labels:H.map(h=>h.n.length>8?h.n.slice(0,8)+'…':h.n),datasets:[{data:H.map(h=>Math.round((h.cur||h.avg)*h.qty)),backgroundColor:COLORS.slice(0,H.length),borderWidth:2,borderColor:'#fff'}]},
    options:{responsive:true,maintainAspectRatio:false,cutout:'55%',plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>`${fmt(c.raw)} (${(c.raw/tV*100).toFixed(1)}%)`}}}}
  });
  lc.innerHTML=H.map((h,i)=>{const v=(h.cur||h.avg)*h.qty,p=tV>0?v/tV*100:0;return`<div class="lrow"><div class="ldot" style="background:${COLORS[i%COLORS.length]}"></div><div class="lnm">${h.n}</div><div class="lpc">${p.toFixed(1)}%</div><div class="lvl">${fmt(v)}</div></div>`;}).join('')+`<div style="border-top:1px solid #e8e3d8;padding-top:9px;margin-top:4px;display:flex;justify-content:space-between"><span style="font-size:13px;font-weight:600">합계</span><span style="font-size:13px;font-weight:700;color:#2563eb">${fmt(tV)}</span></div>`;
}

/* ===== HOLDING ACTIONS ===== */
function delH(id){
  const h=D.h.find(x=>x.id===id);
  if(h&&!confirm(`${h.n} 삭제할까요?`))return;
  D.h=D.h.filter(x=>x.id!==id);save();render();
}
async function addHolding(){
  const nm=document.getElementById('aName').value.trim();
  const avg=parseFloat(document.getElementById('aAvg').value);
  const qty=parseInt(document.getElementById('aQty').value);
  const dy=parseFloat(document.getElementById('aDy').value)||0;
  const df=document.getElementById('aDf').value;
  const acct=document.getElementById('aAcct').value;
  if(!nm){alert('종목명을 입력해주세요');return;}
  if(!avg||!qty){alert('평단가와 수량을 입력해주세요');return;}
  const dbItem=SEARCH_DB.find(x=>x.n===nm||x.s===nm.toUpperCase());
  const sym=dbItem?dbItem.s:toSym(nm);
  if(dbItem&&!document.getElementById('aDy').value)document.getElementById('aDy').value=dbItem.dy||'';
  if(dbItem&&document.getElementById('aDf').value==='없음'&&dbItem.df!=='없음')document.getElementById('aDf').value=dbItem.df;
  const id=Date.now();
  D.h.push({id,n:nm,sym,avg,avgCost:avg,qty,cur:avg,dy,df:dy>0?df:'없음',isDv:dy>0,err:0,divHistory:undefined,acct,memo:''});
  save();document.getElementById('addOv').classList.remove('show');render();
  ['aName','aAvg','aQty','aDy'].forEach(x=>document.getElementById(x).value='');
  document.getElementById('aDf').value='없음';
  document.getElementById('aAcct').value='general';
  if(!isKR(sym))await fetchRate();
  await fetchOne(id);
}

/* ===== BUY ===== */
function openBuy(id){
  BUY_ID=id;
  const h=D.h.find(x=>x.id===id);
  document.getElementById('buyInfo').textContent=`${h.n} · 현재 ${fN(h.qty)}주 · 평단 ${fN(h.avgCost)}원`;
  document.getElementById('bQty').value='';
  document.getElementById('bAvg').value=h.cur||h.avg;
  document.getElementById('buyPrev').style.display='none';
  document.getElementById('buyOv').classList.add('show');
  const upd=()=>{
    const h2=D.h.find(x=>x.id===BUY_ID);if(!h2)return;
    const q=parseInt(document.getElementById('bQty').value)||0;
    const a=parseFloat(document.getElementById('bAvg').value)||0;
    const p=document.getElementById('buyPrev');
    if(q>0&&a>0){const nq=h2.qty+q,na=Math.round((h2.avgCost*h2.qty+a*q)/nq);p.textContent=`매수 후 → ${fN(nq)}주 · 평균단가 ${fN(na)}원`;p.style.display='block';}
    else p.style.display='none';
  };
  document.getElementById('bQty').oninput=upd;document.getElementById('bAvg').oninput=upd;
}
function confirmBuy(){
  if(!BUY_ID)return;
  const q=parseInt(document.getElementById('bQty').value)||0;
  const a=parseFloat(document.getElementById('bAvg').value)||0;
  if(!q||!a){alert('수량과 단가를 입력해주세요');return;}
  D.h=D.h.map(h=>{
    if(h.id!==BUY_ID)return h;
    const nq=h.qty+q,na=Math.round((h.avgCost*h.qty+a*q)/nq);
    return{...h,qty:nq,avgCost:na,avg:na};
  });
  save();document.getElementById('buyOv').classList.remove('show');render();
}

/* ===== SELL ===== */
function openSell(id){
  SELL_ID=id;
  const h=D.h.find(x=>x.id===id);
  document.getElementById('sellInfo').textContent=`${h.n} · ${fN(h.qty)}주 보유 · 평단 ${fN(h.avgCost)}원`;
  document.getElementById('sQty').value='';
  document.getElementById('sAvg').value=h.cur||h.avg;
  document.getElementById('sellPrev').style.display='none';
  document.getElementById('sellOv').classList.add('show');
  const upd=()=>{
    const h2=D.h.find(x=>x.id===SELL_ID);if(!h2)return;
    const q=parseInt(document.getElementById('sQty').value)||0;
    const a=parseFloat(document.getElementById('sAvg').value)||0;
    const p=document.getElementById('sellPrev');
    if(q>0&&a>0){
      const pnl=(a-h2.avgCost)*q,pct=(a-h2.avgCost)/h2.avgCost*100;
      const rem=h2.qty-q;
      p.innerHTML=`<div><b>${pnl>=0?'+':''}}${fmt(pnl)}</b> (${pct>=0?'+':''}${pct.toFixed(2)}%) ${q>=h2.qty?'<b style="color:#ea580c">전량 매도</b>':`잔여 ${fN(rem)}주`}</div>`;
      p.style.cssText=`background:${pnl>=0?'#f0fdf4':'#fef2f2'};border-radius:9px;padding:9px 12px;font-size:12px;color:${pnl>=0?'#16a34a':'#dc2626'};margin-bottom:14px;display:block`;
    }else p.style.display='none';
  };
  document.getElementById('sQty').oninput=upd;document.getElementById('sAvg').oninput=upd;
}
function confirmSell(){
  if(!SELL_ID)return;
  const q=parseInt(document.getElementById('sQty').value)||0;
  const a=parseFloat(document.getElementById('sAvg').value)||0;
  if(!q||!a){alert('수량과 단가를 입력해주세요');return;}
  const h=D.h.find(x=>x.id===SELL_ID);
  if(!h)return;
  if(q>h.qty){alert(`보유 수량(${fN(h.qty)}주)을 초과합니다`);return;}
  const pnl=(a-h.avgCost)*q,pct=(a-h.avgCost)/h.avgCost*100;
  D.sells.push({n:h.n,qty:q,price:a,avgCost:h.avgCost,pnl:Math.round(pnl),pnlRate:pct,date:new Date().toLocaleDateString('ko-KR')});
  if(q>=h.qty){D.h=D.h.filter(x=>x.id!==SELL_ID);}
  else{D.h=D.h.map(x=>x.id===SELL_ID?{...x,qty:x.qty-q}:x);}
  save();document.getElementById('sellOv').classList.remove('show');render();
}

/* ===== MEMO ===== */
let MEMO_ID=null;
function openMemo(id){
  MEMO_ID=id;
  const h=D.h.find(x=>x.id===id);
  // inline edit - create temp textarea over memo-disp
  const memoDisp=document.querySelector(`[onclick="openMemo(${id})"]`);
  if(!memoDisp)return;
  const ta=document.createElement('textarea');
  ta.className='memo-input';ta.rows=2;ta.value=h.memo||'';ta.placeholder='메모를 입력하세요...';
  memoDisp.replaceWith(ta);ta.focus();
  ta.addEventListener('blur',()=>{
    D.h=D.h.map(x=>x.id===id?{...x,memo:ta.value.trim()}:x);
    save();render();
  });
  ta.addEventListener('keydown',e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();ta.blur();}});
}

/* ===== EXPORT/IMPORT ===== */
function exportData(){
  const blob=new Blob([JSON.stringify(D,null,2)],{type:'application/json'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download=`portfolio_${new Date().toISOString().split('T')[0]}.json`;a.click();
}
function importData(e){
  const f=e.target.files[0];if(!f)return;
  const r=new FileReader();
  r.onload=ev=>{
    try{
      const nd=JSON.parse(ev.target.result);
      if(!nd.h)throw new Error('invalid');
      if(!confirm('현재 데이터를 불러온 파일로 교체할까요?\n현재 데이터는 사라집니다.'))return;
      D=nd;if(!D.sells)D.sells=[];if(!D.goalMon)D.goalMon=0;
      save();render();alert('불러오기 완료!');
    }catch{alert('올바른 포트폴리오 파일이 아닙니다.');}
  };
  r.readAsText(f);e.target.value='';
}

/* ===== SEARCH AUTOCOMPLETE (Naver Finance 전종목) ===== */
let _ddTimer=null;
function doSearchDD(q){
  const dd=document.getElementById('searchDD');
  q=q.trim();
  if(!q){dd.style.display='none';return;}

  // 로컬 DB 즉시 표시
  const local=SEARCH_DB.filter(x=>
    x.n.includes(q)||x.s.toLowerCase().includes(q.toLowerCase())
  ).slice(0,5);
  showDD(dd,local,q);

  // 네이버 자동완성 API (디바운스 200ms)
  if(_ddTimer)clearTimeout(_ddTimer);
  _ddTimer=setTimeout(()=>fetchNaverAC(q,dd),200);
}

async function fetchNaverAC(q,dd){
  try{
    const url=`https://ac.finance.naver.com/ac?q=${encodeURIComponent(q)}&q_enc=UTF-8&st=111&sug_typ=1&u_os=Android&u_ie=utf8&u_timezoneoffset=540&collapse=1&r_format=json&r_enc=UTF-8&r_lt=11&r_unicode=0&r_escape=1`;
    // CORS 프록시 순차 시도
    let j=null;
    for(const mkP of PROXIES){
      try{
        const r=await fetch(mkP(url),{signal:AbortSignal.timeout(4000)});
        if(!r.ok)continue;
        const text=await r.text();
        const raw=text.startsWith('{"contents"')?JSON.parse(text).contents:text;
        j=JSON.parse(raw);
        break;
      }catch{}
    }
    if(!j||!j.items)return;

    // items: [[KOSPI배열],[KOSDAQ배열]]  각 항목: [이름, 코드, ...]
    const results=[];
    (j.items||[]).forEach((group,gi)=>{
      (group||[]).forEach(item=>{
        const name=item[0],code=item[1];
        if(!name||!code)return;
        const market=gi===0?'KOSPI':'KOSDAQ';
        const sym=code+(gi===0?'.KS':'.KQ');
        // 로컬 DB에 추가 정보 있으면 병합
        const db=SEARCH_DB.find(x=>x.s===sym||x.n===name);
        results.push({
          n:name,s:sym,
          dy:db?db.dy:0,
          df:db?db.df:'없음',
          isDv:db?db.isDv:false,
          market
        });
      });
    });

    // 중복 제거 (로컬 DB와)
    const seen=new Set();
    const merged=[
      ...SEARCH_DB.filter(x=>x.n.includes(q)||x.s.toLowerCase().includes(q.toLowerCase())),
      ...results
    ].filter(x=>{if(seen.has(x.s))return false;seen.add(x.s);return true;}).slice(0,12);

    showDD(dd,merged,q);
  }catch{}
}

function showDD(dd,items,q){
  if(!items.length){dd.style.display='none';return;}
  dd.innerHTML=items.map(x=>{
    const hl=n=>n.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi'),'<b style="color:#2563eb">$1</b>');
    const mkt=x.market?`<span style="font-size:10px;background:#f3f3f1;color:#888;padding:1px 5px;border-radius:4px;margin-left:4px">${x.market}</span>`:'';
    return`<div onclick="pickSearch('${x.n.replace(/'/g,"\\'")}','${x.s}',${x.dy},'${x.df}',${x.isDv?1:0})" style="padding:10px 14px;cursor:pointer;border-bottom:1px solid #f3f3f1;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:13px;font-weight:600">${hl(x.n)}${mkt}</div>
      <div style="font-size:11px;color:#aaa;margin-top:1px">${x.s}${x.isDv&&x.dy>0?` · 배당 ${x.dy}% · ${x.df}`:''}</div></div>
    </div>`;
  }).join('');
  dd.style.display='block';
}

function pickSearch(n,s,dy,df,isDv){
  document.getElementById('aName').value=n;
  document.getElementById('aDy').value=dy||'';
  document.getElementById('aDf').value=df||'없음';
  document.getElementById('searchDD').style.display='none';
  if(_ddTimer)clearTimeout(_ddTimer);
}
function closeDD(){document.getElementById('searchDD').style.display='none';}
document.addEventListener('click',e=>{if(!e.target.closest('#searchDD')&&e.target.id!=='aName')closeDD();});

render();
</script>
